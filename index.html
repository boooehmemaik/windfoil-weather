  // Hydrate rider profile / gear / auto-setup toggle from the SERVER on mount,
  // for the same iOS-Safari reason as the locations above. setRider (not just
  // setRi) so the loaded profile immediately drives the analysis.
  useEffect(()=>{
    let cancelled=false;
    fetch("/api/prefs",{credentials:"include"})
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        if(cancelled||!d) return;
        if(d.wf_rider&&typeof d.wf_rider==="object"){ setRider(d.wf_rider); setRi(d.wf_rider); saveStored("wf_rider",d.wf_rider); }
        if(Array.isArray(d.wf_gear)){ setGear(d.wf_gear); saveStored("wf_gear",d.wf_gear); }
        if(typeof d.wf_usegear==="boolean"){ setUseGear(d.wf_usegear); saveStored("wf_usegear",d.wf_usegear); }
        if(d.wf_theme==="light"||d.wf_theme==="dark"){ setThemeState(d.wf_theme); saveStored("wf_theme",d.wf_theme); }
      })
      .catch(()=>{});
    return ()=>{ cancelled=true; };
  },[]);
  const [geoStatus,setGeoStatus]= useState(""); // "", "loading", "error"
  const [geoError,setGeoError] = useState("");
  const [locTab,setLocTab]     = useState("preset");
  const [selPreset,setSelPreset]= useState(0);
  // Last 5 manually entered / GPS locations, most-recent first (persisted).
  const [recent,setRecent]     = useState(()=>loadStored("wf_loc_recent",[]));
  const [custom,setCustom]     = useState({link:"",name:""});
  const [linkError,setLinkError]= useState("");
  const [stations,setStations] = useState([]);
  const [stationUrl,setStationUrl] = useState("");
  const [nearbyStations,setNearbyStations] = useState([]);
  const [nearbyStatus,setNearbyStatus] = useState(""); // "", "loading", "live", "meta", "unavailable"
  const [nearbyRadius,setNearbyRadius] = useState(null); // chosen search radius (km)
  const [stationCmp,setStationCmp] = useState(null); // { current, hist, confidence, notes, available }
  const [stationCmpStatus,setStationCmpStatus] = useState(""); // "", "loading", "ok", "unavailable"
  // Admin tab
  const [adminOpen,setAdminOpen]     = useState(false);
  const [adminPw,setAdminPw]         = useState("");
  const [adminAuthed,setAdminAuthed] = useState(false);
  const [adminToken,setAdminToken]   = useState("");
  const [adminBusy,setAdminBusy]     = useState(false);
  const [adminOut,setAdminOut]       = useState("");
  const [adminErr,setAdminErr]       = useState("");
  const [adminTab,setAdminTab]       = useState("actions"); // "actions" | "users"
  const [users,setUsers]             = useState([]);
  const [usersMsg,setUsersMsg]       = useState("");
  const [pwInputs,setPwInputs]       = useState({}); // userId -> new password draft

  const PRESETS = [
    {lat:48.0703,lon:11.1167,name:"Wörthsee / Pilsensee"},
  ];

  useEffect(()=>{
    const t=setInterval(()=>setClock(new Date().toLocaleTimeString("de-DE")),1000);
    return()=>clearInterval(t);
  },[]);

  // ── Find REAL weather stations near the spot ────────────────────────────────
  // Server-side discovery via Meteostat (keyless bulk metadata, haversine within
  // an adaptive radius); current wind for the nearest few comes from the
  // Weatherbit-backed proxy. Replaces the old fake "grid sample" approximation.
  async function fetchNearbyStations(lat, lon) {
    setNearbyStatus("loading");
    try {
      const r = await fetch(`${PROXY_BASE}/nearby?lat=${lat}&lon=${lon}`, { signal: AbortSignal.timeout(15000) });
      const d = await r.json();
      if(d && d.ok && Array.isArray(d.stations) && d.stations.length){
        setNearbyStations(d.stations);
        setNearbyRadius(d.radiusKm ?? null);
        setNearbyStatus(d.stations.some(s=>s.src==="obs") ? "live" : d.stations.some(s=>s.src==="model") ? "model" : "meta");
        return;
      }
      setNearbyStations([]);
      setNearbyRadius(null);
      setNearbyStatus("unavailable");
    } catch(e) {
      setNearbyStations([]);
      setNearbyRadius(null);
      setNearbyStatus("unavailable");
    }
  }

  // ── Reverse geocode coords → place name via Open-Meteo (no key needed) ──────
  async function reverseGeocode(lat, lon) {
    try {
      const url = `https://geocoding-api.open-meteo.com/v1/search?latitude=${lat}&longitude=${lon}&count=1&language=de`;
      const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if(r.ok){
        const d = await r.json();
        if(d.results && d.results[0]){
          const p = d.results[0];
          return [p.name, p.admin1, p.country].filter(Boolean).join(", ");
        }
      }
    } catch(e) { /* fall through */ }
    return null;
  }

  // ── Use the device's current GPS position ───────────────────────────────────
  function useMyLocation() {
    setGeoError("");
    if(!("geolocation" in navigator)){
      setGeoError("Geolocation wird von diesem Gerät/Browser nicht unterstützt.");
      return;
    }
    setGeoStatus("loading");
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = Math.round(pos.coords.latitude  * 10000) / 10000;
        const lon = Math.round(pos.coords.longitude * 10000) / 10000;
        const name = await reverseGeocode(lat, lon);
        const nl = { lat, lon, name: name || `Mein Standort (${lat.toFixed(3)}°, ${lon.toFixed(3)}°)` };
        setLoc(nl);
        pushRecent(nl);
        setGeoStatus("");
        setShowLoc(false);
      },
      (err) => {
        setGeoStatus("error");
        const msg = err.code === 1 ? "Standortzugriff verweigert. Bitte in den Browser-Einstellungen erlauben."
                  : err.code === 2 ? "Position nicht verfügbar. GPS/Ortungsdienste aktiv?"
                  : err.code === 3 ? "Zeitüberschreitung bei der Standortbestimmung."
                  : "Standort konnte nicht ermittelt werden.";
        setGeoError(msg);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  }

  const loadData = useCallback(async(l) => {
    setLoading(true);
    setApiStatus({forecast:"⏳",historical:"⏳"});
    setLoadMsg("Verbinde mit Open-Meteo Forecast API…");

    // Fetch forecast independently – fallback to demo
    let fc = null;
    try {
      fc = await tryFetchForecast(l.lat, l.lon);
      applyPelerBoost(fc, l.lat, l.lon); // lift the under-forecast channeled N-wind at Garda
      const ml = MODEL_LABELS[fc.__model];
      setApiStatus(s=>({...s,forecast:(ml ? `✅ ${ml}` : "✅ Live")+(fc.__pelerBoost ? " +Pelèr" : "")}));
      setLoadMsg("Forecast geladen. Lade ERA5-Archiv…");
    } catch(e) {
      setApiStatus(s=>({...s,forecast:"⚠️ Demo"}));
      fc = buildDemoForecast(l.lat, l.lon);
      setLoadMsg("Forecast offline → Demo-Daten. Lade Archiv…");
    }
    setForecast(fc);

    // Fetch historical independently – fallback to demo
    let hist = null;
    try {
      hist = await tryFetchHistorical(l.lat, l.lon);
      setApiStatus(s=>({...s,historical:"✅ Live"}));
    } catch(e) {
      setApiStatus(s=>({...s,historical:"⚠️ Demo"}));
      hist = buildDemoHistorical(l.lat, l.lon);
    }
    setHist(hist);
    setActiveDay(0);
    setLoading(false);
    // Load nearby stations in the background (non-blocking)
    fetchNearbyStations(l.lat, l.lon);
    // Real station vs model comparison (non-blocking)
    runStationComparison(l.lat, l.lon, fc, hist);
  },[]);

  // ── Compare REAL station data to the model → confidence score ──────────────
  async function runStationComparison(lat, lon, fc, hist) {
    setStationCmpStatus("loading");
    const [cur, bias] = await Promise.all([
      fetchStationCurrent(lat, lon),
      fetchStationBias(lat, lon),
    ]);
    const biasOk = !!(bias && bias.ok);

    // If neither a current observation nor a station bias is available, graceful.
    if((!cur || !cur.ok) && !biasOk){
      setStationCmp({ available:false, current:cur, bias });
      setStationCmpStatus("unavailable");
      return;
    }

    // Model current values (this hour) from forecast
    const nowH = new Date().getHours();
    const modelCurrentWind = fc?.hourly?.windspeed_10m?.[nowH] ?? null;
    const modelCurrentDir  = fc?.hourly?.winddirection_10m?.[nowH] ?? null;

    // Historical means come from the overlapping-window bias (real station obs vs
    // Open-Meteo archive over the SAME dates/hours). Both already in m/s.
    const stationHistMeanWind = biasOk ? bias.stationMeanMs : null;
    const modelHistMeanWind   = biasOk ? bias.modelMeanMs   : null;

    const { confidence, notes } = computeConfidence({
      stationCurrent: cur, modelCurrentWind, modelCurrentDir,
      stationHistMeanWind, modelHistMeanWind,
    });

    setStationCmp({
      available:true, current:cur, bias,
      modelCurrentWind, modelCurrentDir,
      stationHistMeanWind, modelHistMeanWind,
      confidence, notes,
    });
    setStationCmpStatus("ok");
  }

  useEffect(()=>{ loadData(loc); },[loc]);

  // ── Real measured-station overlay (ground truth vs forecast) ──────────────
  // For spots with a live anemometer (e.g. Torbole) fetch the actual measured
  // wind/gust for the displayed day. Backend no-ops for spots without one, so
  // the overlay simply doesn't appear elsewhere. Keyed by the day's date so it
  // stays correct when switching day tabs.
  useEffect(()=>{
    if(!forecast || !forecast.hourly.time.length){ setMeasured(null); return; }
    const times=forecast.hourly.time;
    const [fy,fm,fd]=times[0].slice(0,10).split('-').map(Number);
    const t=new Date(fy,fm-1,fd+activeDay);
    const ds=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    let cancelled=false;
    fetch(`/api/station/measured?lat=${loc.lat}&lon=${loc.lon}&date=${ds}`)
      .then(r=>r.json())
      .then(d=>{ if(!cancelled) setMeasured(d&&d.ok?d:null); })
      .catch(()=>{ if(!cancelled) setMeasured(null); });
    return ()=>{ cancelled=true; };
  },[forecast,activeDay,loc]);

  // ── Compute day start indices from actual calendar dates ──────────────────
  // API may start mid-day (e.g. 17:00 local time) — find index where each
  // calendar day (00:00) begins, so "Heute" = today's 00:00 not hour[0]
  const dayStartIndices = (() => {
    if(!forecast) return [0,24,48,72,96,120,144];
    const times = forecast.hourly.time;
    if(!times.length) return [0,24,48,72,96,120,144];
    // CRITICAL: data is in the SPOT's timezone (timezone=auto), which may differ
    // from the user's browser clock. Anchor "today" to the FIRST timestamp's
    // calendar date in the data itself, so days are always correct for any user.
    const firstDateStr = times[0].slice(0,10);          // "2026-05-30"
    const [fy,fm,fd] = firstDateStr.split('-').map(Number);
    const result = [];
    for(let d=0; d<7; d++){
      // Build the target date by adding d days to the data's first date
      const target = new Date(fy, fm-1, fd + d);
      const y=target.getFullYear(), m=String(target.getMonth()+1).padStart(2,'0'), dy=String(target.getDate()).padStart(2,'0');
      const prefix = `${y}-${m}-${dy}`;
      let idx = times.findIndex(t => typeof t==="string" && t.startsWith(prefix));
      if(idx === -1) idx = d * 24;
      result.push(idx);
    }
    return result;
  })();

  // Effective planing threshold for the ACTIVE location: a spot-calibrated value
  // (derived from THIS spot's feedback) takes precedence over the rider's manual
  // override; otherwise null => fall back to the formula. This keeps the local
  // wind assessment shaping only the local score, never the global rider profile.
  const effPlaneMs = (spotCal && spotCal.rolling!=null) ? knToMs(spotCal.rolling)
                   : (rider.planeKn ? knToMs(parseFloat(rider.planeKn)) : null);

  // ── Derived day data ────────────────────────────────────────────────────────
  const dayData = (() => {
    if(!forecast) return null;
    const h=forecast.hourly, s=dayStartIndices[activeDay] ?? activeDay*24;
    const wins=h.windspeed_10m.slice(s,s+24);
    const gust=h.windgusts_10m.slice(s,s+24);
    const dirs=h.winddirection_10m.slice(s,s+24);
    const temp=h.temperature_2m.slice(s,s+24);
    const pres=h.surface_pressure.slice(s,s+24);
    const labels=Array.from({length:24},(_,i)=>{
      const t=h.time[s+i];
      // Parse directly from ISO string to avoid timezone offset bugs
      if(t){ const hh=t.slice(11,13), mm=t.slice(14,16); return `${hh}:${mm}`; }
      return `${String(i).padStart(2,'0')}:00`;
    });
    const regime=thermalRegime(loc.lat,loc.lon);
    const thermik=Array.from({length:24},(_,i)=>computeThermik(h,s+i,regime));
    const slice=(arr,a,b)=>arr.slice(a,b).filter(Boolean);
    const midW=slice(wins,12,16).reduce((a,b)=>a+b,0)/4||wins[12]||0;
    const midG=slice(gust,12,16).reduce((a,b)=>a+b,0)/4||gust[12]||0;
    const midDir=dirs[14]??dirs[12]??180;
    const sb=seaBreeze(midDir,14,new Date().getMonth()+1,regime); // getMonth() is local — correct
    const effW=midW+(sb.active?sb.boost:0);
    // Choose window: use midW (not effW) — consistent with dayScores tabs.
    let win, pickedGear=null;
    if(useGear && gear.length){
      const best = pickBestSetup(gear, rider.weight, rider.skill, midW);
      if(best){ win = best.win; pickedGear = best.gear; }
    }
    if(!win){
      win=calcWindow(rider.weight,rider.wingSize,rider.foilFront,rider.skill, effPlaneMs);
    }
    const scores=wins.map(w=>scoreHour(w,win));
    const avgW=wins.reduce((a,b)=>a+b,0)/wins.length;
    const maxG=Math.max(...gust);
    const maxT=Math.max(...temp);
    const maxTh=Math.max(...thermik);
    const dayScore=scoreDay(wins,win);
    const session=bestSession(wins,win); // {score,startHour,endHour}
    const thInfo=classifyThermik(maxTh);
    return{wins,gust,dirs,temp,pres,labels,thermik,win,scores,avgW,maxG,maxT,maxTh,midW,midG,sb,regime,effW,dayScore,thInfo,pickedGear,session};
  })();

  const dayScores = forecast ? Array.from({length:7},(_,d)=>{
    const start = dayStartIndices[d] ?? d*24;
    // representative wind for the day (midday avg) to pick gear
    const dw = forecast.hourly.windspeed_10m.slice(start+12,start+16).filter(Boolean);
    const dayMidW = dw.length ? dw.reduce((a,b)=>a+b,0)/dw.length : (forecast.hourly.windspeed_10m[start+13]||0);
    let win;
    if(useGear && gear.length){
      const best = pickBestSetup(gear, rider.weight, rider.skill, dayMidW);
      if(best) win = best.win;
    }
    if(!win) win=calcWindow(rider.weight,rider.wingSize,rider.foilFront,rider.skill, effPlaneMs);
    return scoreDay(forecast.hourly.windspeed_10m,win,start);
  }) : [];

  const dayNames = forecast ? (() => {
    const times = forecast.hourly.time;
    const firstDateStr = (times && times.length) ? times[0].slice(0,10) : null;
    // Anchor day labels to the data's first calendar date (spot timezone)
    const [fy,fm,fd] = firstDateStr ? firstDateStr.split('-').map(Number) : [0,0,0];
    // Is the data's first day actually "today" in the user's perception?
    // We label relative to the data itself for consistency across timezones.
    return Array.from({length:7},(_,d)=>{
      if(!firstDateStr) return `Tag ${d+1}`;
      const target = new Date(fy, fm-1, fd + d);
      if(d===0) return "Heute";
      if(d===1) return "Morgen";
      return target.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'numeric'});
    });
  })() : [];

  const histData = (() => {
    if(!historical||!dayData) return [];
    const hw=historical.hourly.windspeed_10m, ht=historical.hourly.time;
    const days=Math.floor(hw.length/24);
    const res=[];
    for(let d=0;d<Math.min(days,7);d++){
      const sl=hw.slice(d*24,d*24+24).filter(v=>v!=null);
      const avg=sl.length?sl.reduce((a,b)=>a+b,0)/sl.length:0;
      let label=`T-${days-d}`;
      if(ht[d*24]){ const [y,mo,dy]=ht[d*24].slice(0,10).split('-').map(Number); label=new Date(y,mo-1,dy).toLocaleDateString('de-DE',{weekday:'short',day:'numeric'}); }
      res.push({label,era5:Math.round(avg*10)/10,prog:null});
    }
    res.push({label:"Heute",era5:null,prog:Math.round(cvt(dayData.avgW,windUnit)*10)/10});
  // convert era5 values too
  return res.map(r=>({...r,era5:r.era5!=null?Math.round(cvt(r.era5,windUnit)*10)/10:null}));
  })();

  // ── Recommendation ──────────────────────────────────────────────────────────
  const rec = (() => {
    if(!dayData) return "";
    const{effW,midG,win,pickedGear}=dayData;
    const{weight,wingSize,foilFront,skill}=rider;
    const lines=[];
    if(pickedGear){
      const gname = pickedGear.name ? `<b>${pickedGear.name}</b>` : "Setup";
      lines.push(`🎒 <b>Empfohlenes Setup aus deinem Material:</b> ${gname} — Wing ${pickedGear.wing} m² · Foil ${pickedGear.foil} cm²${pickedGear.planeKn?` · ab ${pickedGear.planeKn} kn`:""}`);
    }
    if(effW<win.minWind){
      lines.push(`⚠️ <b>Zu wenig Wind</b> — ${fmtW(effW,windUnit)}, benötigt ≥${fmtW(win.minWind,windUnit)}`);
      lines.push(`💡 Größeren Wing wählen oder auf Nachmittags-Thermik warten.`);
    } else if(effW<=win.optMax){
      lines.push(`✅ <b>Optimale Bedingungen</b> — ${fmtW(effW,windUnit)} im Fenster (${fmtW(win.optMin,windUnit)}–${fmtW(win.optMax,windUnit)})`);
      if(!pickedGear) lines.push(`🏄 Wing ${wingSize} m² · Foil ${foilFront} cm² — ideal für ${weight} kg · ${skill}`);
    } else if(effW<=win.maxWind){
      lines.push(`⚠️ <b>Overpowered-Zone</b> — ${fmtW(effW,windUnit)} an der Obergrenze`);
      lines.push(`💡 Kleineren Wing: ${(wingSize-0.5).toFixed(1)} m² erwägen`);
    } else {
      lines.push(`🚨 <b>Zu viel Wind</b> — ${fmtW(effW,windUnit)} > Max ${fmtW(win.maxWind,windUnit)}`);
      lines.push(`⛔ Sitzung abbrechen oder deutlich kleineres Equipment`);
    }
    if(midG-effW>4) lines.push(`💨 <b>Böen-Δ ${fmtW(midG-effW,windUnit)}</b> — Erhöhte Kontrollbelastung!`);
    lines.push(`<br>📐 <b>Dein Fenster:</b> Abheben ${fmtW(win.minWind,windUnit)} · Optimal ${fmtW(win.optMin,windUnit)}–${fmtW(win.optMax,windUnit)} · Max ${fmtW(win.maxWind,windUnit)}`);
    return lines.join("<br>");
  })();

  // ── Chart data ──────────────────────────────────────────────────────────────
  // Real measured series for THIS day (only when the feed's date matches the
  // displayed day). Aligned to the chart by the row's clock hour, not its index.
  const activeDateStr = forecast ? (forecast.hourly.time[dayStartIndices[activeDay]]||"").slice(0,10) : null;
  const meas = (measured && measured.ok && measured.date===activeDateStr) ? measured.hourly : null;
  const windData  = dayData?dayData.labels.map((l,i)=>{
    const hh=parseInt(l.slice(0,2),10);
    const mw = meas && meas.wind[hh]!=null ? cvt(meas.wind[hh],windUnit) : null;
    const mg = meas && meas.gust[hh]!=null ? cvt(meas.gust[hh],windUnit) : null;
    return {h:l,wind:cvt(dayData.wins[i],windUnit),gust:cvt(dayData.gust[i],windUnit),score:dayData.scores[i],mwind:mw,mgust:mg};
  }):[];
  const dirData   = dayData?dayData.labels.map((l,i)=>({idx:i,dir:dayData.dirs[i]})):[];
  const tempData  = dayData?dayData.labels.map((l,i)=>({h:l,temp:dayData.temp[i]})):[];
  const presData  = dayData?dayData.labels.map((l,i)=>({h:l,pres:Math.round(dayData.pres[i])})):[];
  const thData    = dayData?dayData.labels.map((l,i)=>({h:l,th:dayData.thermik[i]})):[];

  const sc2col = s => s>=75?C.go:s>=45?C.caution:C.stop;

  // ── Styles ──────────────────────────────────────────────────────────────────
  // ── Admin login: password → server validates against env file → returns token ─
  // The password is NEVER stored in the frontend. It is sent to the proxy, which
  // checks it against ADMIN_PASSWORD (from windfoil.env) and returns the token.
  async function adminLogin() {
    setAdminErr("");
    if (!adminPw) { setAdminErr("Bitte Passwort eingeben."); return; }
    setAdminBusy(true);
    try {
      const r = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: adminPw }),
      });
      const d = await r.json();
      if (d.ok && d.token) {
        setAdminToken(d.token);   // held only in memory for this session
        setAdminAuthed(true);
        setAdminPw("");           // clear password from state
        setAdminErr("");
      } else {
        setAdminErr(d.error || "Login fehlgeschlagen.");
      }
    } catch(e) { setAdminErr("Server nicht erreichbar (läuft der Proxy?)."); }
    setAdminBusy(false);
  }
  async function adminRun(path, label) {
    setAdminBusy(true); setAdminOut(`▶ ${label}…`); setAdminErr("");
    try {
      const r = await fetch(`/api/admin/${path}`, { headers: { "X-Admin-Token": adminToken } });
      const d = await r.json();
      setAdminOut((d.output || JSON.stringify(d)).trim());
      if (!d.ok) setAdminErr("Aktion meldete einen Fehler (siehe Ausgabe).");
    } catch(e) { setAdminErr("Server nicht erreichbar."); setAdminOut(""); }
    setAdminBusy(false);
  }
  // ── Admin: user management ──────────────────────────────────────────────────
  async function adminApi(path, opts={}) {
    const headers = { "X-Admin-Token": adminToken, ...(opts.headers||{}) };
    if (opts.body) headers["Content-Type"] = "application/json";
    const r = await fetch(`/api/admin/${path}`, { ...opts, headers });
    return r.json();
  }
  async function loadUsers() {
    setUsersMsg(""); setAdminBusy(true);
    try {
      const d = await adminApi("users");
      if (d.ok) setUsers(d.users); else setUsersMsg(d.error || "Laden fehlgeschlagen.");
    } catch(e) { setUsersMsg("Server nicht erreichbar."); }
    setAdminBusy(false);
  }
  async function toggleUser(u) {
    setUsersMsg(""); setAdminBusy(true);
    try {
      const d = await adminApi("users/set-disabled",
        { method:"POST", body: JSON.stringify({ id:u.id, disabled: !u.disabled }) });
      if (d.ok) await loadUsers(); else { setUsersMsg(d.error || "Fehler."); setAdminBusy(false); }
    } catch(e) { setUsersMsg("Server nicht erreichbar."); setAdminBusy(false); }
  }
  async function resetUserPw(u) {
    const pw = (pwInputs[u.id]||"").trim();
    if (pw.length < 10) { setUsersMsg("Passwort muss mindestens 10 Zeichen haben."); return; }
    setUsersMsg(""); setAdminBusy(true);
    try {
      const d = await adminApi("users/reset-password",
        { method:"POST", body: JSON.stringify({ id:u.id, password: pw }) });
      if (d.ok) { setUsersMsg(`✓ Passwort für ${u.email} gesetzt.`); setPwInputs(p=>({...p,[u.id]:""})); }
      else setUsersMsg(d.error || "Fehler.");
    } catch(e) { setUsersMsg("Server nicht erreichbar."); }
    setAdminBusy(false);
  }

  // Remember a location in the rolling "last 5" history (dedupe by coords,
  // most-recent first). Covers both manual entries and the GPS location.
  //
  // Source of truth is the SERVER (per-user) — iOS Safari silently drops
  // localStorage (Private Browsing / "Block All Cookies" / ITP purge), so the
  // old localStorage-only list kept vanishing on reload. We still mirror to
  // localStorage as an offline cache. Pass {active:true} to also persist it as
  // the saved/default spot ("★ merken").
  function pushRecent(l, opts) {
    if(!l || l.lat==null || l.lon==null) return;
    const active = !!(opts && opts.active);
    const key = x => `${(+x.lat).toFixed(4)},${(+x.lon).toFixed(4)}`;
    const k = key(l);
    const entry = { lat:+l.lat, lon:+l.lon, name:l.name };
    const next = [entry, ...recent.filter(r=>key(r)!==k)].slice(0,5);
    setRecent(next); saveStored("wf_loc_recent", next);
    if(active) saveStored("wf_loc", l);
    fetch("/api/locations",{method:"POST",credentials:"include",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({lat:+l.lat,lon:+l.lon,name:l.name,setActive:active})})
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d&&Array.isArray(d.recent)){ setRecent(d.recent); saveStored("wf_loc_recent",d.recent); } })
      .catch(()=>{});
  }

  // Resolve the chosen location from the active modal tab (preset or link)
  function resolveLoc() {
    if(locTab==="preset") return PRESETS[selPreset];
    const parsed = parseLocationInput(custom.link);
    if(!parsed){ setLinkError("Bitte einen Link oder Koordinaten eingeben."); return null; }
    if(parsed.error){ setLinkError(parsed.error); return null; }
    const name = custom.name.trim() || parsePlaceName(custom.link) || `${parsed.lat.toFixed(3)}°N ${parsed.lon.toFixed(3)}°E`;
    return { lat:parsed.lat, lon:parsed.lon, name };
  }

  const S={
    wrap:{fontFamily:"'Barlow',sans-serif",background:C.bg,color:C.text,minHeight:"100vh",fontSize:14},
    hdr:{background:C.headerBg,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6,position:"sticky",top:0,zIndex:100},
    locBar:{background:C.panel,borderBottom:`2px solid ${C.sky}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8},
    riderBar:{background:C.panel,borderBottom:`1px solid ${C.border}`,borderTop:`2px solid ${C.signal}`,padding:"14px 20px"},
    main:{padding:"14px clamp(10px,3vw,18px) 40px",maxWidth:1200,margin:"0 auto"},
    card:{background:C.panel,border:`1px solid ${C.border2}`,borderRadius:8,padding:"12px 16px",marginBottom:12},
    sec:{fontFamily:"monospace",fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted,marginBottom:8},
    btn:{background:C.signal,color:"#fff",border:"none",borderRadius:4,fontWeight:700,fontSize:13,padding:"7px 18px",cursor:"pointer",fontFamily:"monospace"},
    btnG:{background:"transparent",border:`1px solid ${C.border2}`,color:C.muted,borderRadius:4,fontSize:12,padding:"4px 10px",cursor:"pointer"},
    inp:{background:C.bg,border:`1px solid ${C.border2}`,color:C.text,borderRadius:4,padding:"5px 8px",fontFamily:"monospace",fontSize:12,outline:"none"},
    fl:{fontFamily:"monospace",fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4},
    fi:{background:C.bg,border:`1px solid ${C.border2}`,color:C.text,borderRadius:4,padding:"0 10px",fontFamily:"monospace",fontSize:14,outline:"none",height:40,width:"100%",boxSizing:"border-box"},
    grid2:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:12,marginBottom:12},
    grid6:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12},
    cw:{height:190}, cwL:{height:210},
  };

  return (
    <div style={S.wrap}>
      {/* HEADER */}
      <header style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24,color:C.signal}}>⟁</span>
          <div>
            <div style={{fontFamily:"monospace",fontWeight:900,fontSize:15,letterSpacing:"0.15em",color:C.text}}>WINDFOIL</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:C.muted,letterSpacing:"0.1em"}}>Weather Intelligence · v3.8.7</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <span style={{display:"flex",gap:6,fontSize:9,fontFamily:"monospace"}}>
            <span title="Forecast API">FC:{apiStatus.forecast}</span>
            <span title="Historical API">ERA5:{apiStatus.historical}</span>
          </span>
          <div style={{display:"flex",gap:3}}>
            {["ms","kn","bf"].map(u=>(
              <button key={u} onClick={()=>setWindUnit(u)} style={{background:windUnit===u?C.signal:"transparent",border:`1px solid ${windUnit===u?C.signal:C.border2}`,color:windUnit===u?"#fff":C.muted,borderRadius:3,padding:"2px 7px",fontFamily:"monospace",fontSize:10,cursor:"pointer",textTransform:"uppercase"}}>
                {u==="ms"?"m/s":u==="kn"?"kn":"BF"}
              </button>
            ))}
          </div>
          <button onClick={()=>setTheme(theme==="light"?"dark":"light")}
            title={theme==="light"?"Dark Mode":"Light Mode"}
            style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.muted,borderRadius:3,padding:"2px 8px",fontFamily:"monospace",fontSize:13,cursor:"pointer",lineHeight:1.2}}>
            {theme==="light"?"☾":"☀"}
          </button>
          <span style={{fontFamily:"monospace",fontSize:13,color:C.signal}}>{clock}</span>
        </div>
      </header>

      {/* LOC BAR */}
      <div style={S.locBar}>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:15}}>
          <span style={{fontSize:20}}>📍</span>
          <b style={{color:"#fff",fontSize:16,letterSpacing:"0.02em"}}>{loc.name}</b>
          <span style={{fontFamily:"monospace",fontSize:11,color:C.sky}}>{loc.lat.toFixed(4)}°N, {loc.lon.toFixed(4)}°E</span>
          {spotCal && spotCal.rolling!=null && (
            <span title={`Abhebe-Schwellenwert aus ${spotCal.samples} Session(s) an diesem Spot — gilt nur lokal`}
              style={{fontFamily:"monospace",fontSize:10,color:C.go,background:"rgba(61,220,132,0.12)",border:`1px solid ${C.go}`,borderRadius:4,padding:"2px 7px"}}>
              📍 lokal kalibriert · ab {spotCal.rolling} kn
            </span>
          )}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button style={{...S.btnG,borderColor:locSaved?C.go:C.border2,color:locSaved?C.go:C.muted}}
            title="Aktuellen Ort als Standard merken"
            onClick={()=>{ pushRecent(loc,{active:true}); setLocSaved(true); setTimeout(()=>setLocSaved(false),2000); }}>
            {locSaved ? "✓ gemerkt" : "★ merken"}
          </button>
          <button style={S.btnG} onClick={()=>setShowLoc(true)}>Ort ändern</button>
          <button style={{...S.btnG,borderColor:C.signal,color:C.signal}}
            title="Session-Feedback geben"
            onClick={()=>setShowFeedback(true)}>📣 Feedback</button>
        </div>
      </div>

      {/* RIDER BAR */}
      <div style={S.riderBar}>
        <div style={{fontFamily:"monospace",fontSize:11,textTransform:"uppercase",letterSpacing:"0.12em",color:C.signal,marginBottom:12,fontWeight:700}}>🏄 Rider-Profil &amp; Equipment</div>

        {/* Rider fields — unified grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:10,marginBottom:10}}>
          {[
            {l:"Gewicht (kg)",k:"weight",step:1,min:40,max:150},
            {l:"Wing (m²)",k:"wingSize",step:.5,min:2,max:12},
            {l:"Foil Front (cm²)",k:"foilFront",step:50,min:600,max:3000},
          ].map(f=>(
            <div key={f.k}>
              <label style={S.fl}>{f.l}</label>
              <input type="number" value={ri[f.k]} step={f.step} min={f.min} max={f.max}
                onChange={e=>setRi(r=>({...r,[f.k]:parseFloat(e.target.value)}))}
                style={S.fi} />
            </div>
          ))}
          <div>
            <label style={S.fl}>Skill-Level</label>
            <select value={ri.skill} onChange={e=>setRi(r=>({...r,skill:e.target.value}))} style={S.fi}>
              {["beginner","intermediate","advanced","pro"].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={S.fl} title="Optional: ab wie viel Wind du erfahrungsgemäß abhebst. Überschreibt die Formel.">Abheben ab (kn) · opt.</label>
            <input type="number" value={ri.planeKn} step={0.5} min={4} max={30} placeholder="z.B. 11"
              onChange={e=>setRi(r=>({...r,planeKn:e.target.value}))}
              style={S.fi} />
          </div>
        </div>

        {/* Action buttons */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          <button style={{...S.btn,flex:"1 1 180px",touchAction:"manipulation"}}
            onClick={()=>{setRider({...ri});setActiveDay(0);}}>ANALYSE STARTEN →</button>
          <button style={{...S.btn,flex:"1 1 180px",background:"transparent",border:`1px solid ${C.go}`,color:C.go,touchAction:"manipulation"}}
            onClick={()=>{ savePref("wf_rider",ri); setRider({...ri}); setProfileSaved(true); setTimeout(()=>setProfileSaved(false),2000); }}>
            {profileSaved ? "✓ GESPEICHERT" : "PROFIL SPEICHERN"}
          </button>
        </div>

        {/* EQUIPMENT MANAGER */}
        <div style={{paddingTop:12,borderTop:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontFamily:"monospace",fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted}}>🎒 Mein Equipment</span>
            <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:useGear?C.go:C.muted,cursor:"pointer"}}>
              <input type="checkbox" checked={useGear} onChange={e=>{setUseGear(e.target.checked); savePref("wf_usegear",e.target.checked); setActiveDay(0);}} />
              Automatische Setup-Wahl
            </label>
          </div>

          {/* existing gear chips */}
          {gear.length>0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {gear.map(g=>(
                <div key={g.id} style={{display:"flex",alignItems:"center",gap:6,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"5px 8px",fontSize:11}}>
                  <span style={{color:C.text}}>{g.name||`${g.wing}m²`}</span>
                  <span style={{color:C.muted,fontFamily:"monospace",fontSize:10}}>{g.wing}m² · {g.foil}cm²{g.planeKn?` · ab ${g.planeKn}kn`:""}</span>
                  <button onClick={()=>{const ng=gear.filter(x=>x.id!==g.id); setGear(ng); savePref("wf_gear",ng); setActiveDay(0);}}
                    style={{background:"none",border:"none",color:C.stop,cursor:"pointer",fontSize:13,padding:0,lineHeight:1}}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* add new gear — unified grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,alignItems:"end"}}>
            <div>
              <label style={S.fl}>Name</label>
              <input value={newGear.name} placeholder="z.B. Leichtwind" onChange={e=>setNewGear(g=>({...g,name:e.target.value}))} style={{...S.fi,height:38}} />
            </div>
            <div>
              <label style={S.fl}>Wing (m²)</label>
              <input type="number" step={0.5} value={newGear.wing} onChange={e=>setNewGear(g=>({...g,wing:e.target.value}))} style={{...S.fi,height:38}} />
            </div>
            <div>
              <label style={S.fl}>Foil (cm²)</label>
              <input type="number" step={50} value={newGear.foil} onChange={e=>setNewGear(g=>({...g,foil:e.target.value}))} style={{...S.fi,height:38}} />
            </div>
            <div>
              <label style={S.fl}>ab (kn)</label>
              <input type="number" step={0.5} value={newGear.planeKn} placeholder="opt." onChange={e=>setNewGear(g=>({...g,planeKn:e.target.value}))} style={{...S.fi,height:38}} />
            </div>
            <div>
              <label style={S.fl}>&nbsp;</label>
              <button style={{...S.btn,width:"100%",height:38,fontSize:11,padding:0,touchAction:"manipulation"}}
                onClick={()=>{
                  if(!newGear.wing||!newGear.foil) return;
                  const entry={...newGear,id:Date.now()};
                  const ng=[...gear,entry];
                  setGear(ng); savePref("wf_gear",ng);
                  setNewGear({name:"",wing:"5.0",foil:"1800",planeKn:""});
                  setActiveDay(0);
                }}>+ Hinzufügen</button>
            </div>
          </div>
          {useGear && gear.length===0 && (
            <p style={{fontSize:10,color:C.caution,marginTop:8}}>Füge mindestens ein Equipment hinzu, damit die automatische Wahl greift.</p>
          )}
        </div>
      </div>

      <div style={S.main}>

        {/* LOADING */}
        {loading && (
          <div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
            <div style={{fontSize:40,marginBottom:12,display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</div>
            <p style={{fontFamily:"monospace",fontSize:13,marginBottom:6}}>{loadMsg}</p>
            <p style={{fontFamily:"monospace",fontSize:10,color:C.dim}}>Bei Verbindungsproblemen werden Demo-Daten geladen</p>
          </div>
        )}

        {!loading && forecast && dayData && (
          <>
            {/* BADGES ROW */}
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
              {[
                {icon:"💨",label:`Ø ${fmtW(dayData.avgW,windUnit)}`,c:dayData.avgW>=dayData.win.optMin&&dayData.avgW<=dayData.win.optMax?C.go:dayData.avgW<dayData.win.minWind?C.stop:C.caution},
                {icon:"⬆",label:`Max Böe ${fmtW(dayData.maxG,windUnit)}`,c:dayData.maxG>dayData.win.maxWind?C.stop:C.caution},
                {icon:"🌡",label:`${dayData.maxT.toFixed(0)}°C max`,c:C.sky},
                {icon:dayData.thInfo.icon,label:dayData.thInfo.label,c:dayData.thInfo.color},
                ...(dayData.sb.active?[{icon:"🌊",label:`Meeresbrise +${fmtW(dayData.sb.boost,windUnit)}`,c:C.sky}]:[]),
              ].map((b,i)=>(
                <div key={i} style={{border:`1px solid ${b.c}`,borderRadius:4,padding:"6px 10px",fontSize:12,color:b.c,display:"flex",alignItems:"center",gap:6,background:C.surface}}>
                  {b.icon} {b.label}
                </div>
              ))}
            </div>

            {/* DAY TABS */}
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {dayNames.map((name,d)=>{
                const rawSc=dayScores[d];
                const tabConf=(d===0 && stationCmp?.available)?stationCmp.confidence:null;
                const sc=tabConf!=null?applyConfidence(rawSc,tabConf).score:rawSc;
                const active=d===activeDay;
                const icon=sc>=75?"✅":sc>=45?"⚠️":"❌";
                const uncertain=d>=4;
                return(
                  <button key={d} onClick={()=>setActiveDay(d)} style={{
                    background:active?C.signal:C.surface, border:`1px solid ${active?C.signal:C.border2}`,
                    color:active?"#fff":C.muted, borderRadius:4, padding:"8px 14px", cursor:"pointer",
                    display:"flex", flexDirection:"column", alignItems:"center", gap:2, minWidth:90,
                    opacity:uncertain?0.72:1 }}>
                    <span style={{fontSize:14}}>{icon}</span>
                    <span style={{fontFamily:"monospace",fontSize:9,textTransform:"uppercase"}}>{name}</span>
                    <span style={{fontFamily:"monospace",fontWeight:900,fontSize:18,color:active?"#fff":sc2col(sc)}}>{sc}</span>
                    {uncertain&&<span style={{fontSize:7,color:active?"rgba(255,255,255,.6)":C.caution,fontFamily:"monospace",letterSpacing:"0.05em"}}>≈ unsicher</span>}
                  </button>
                );
              })}
            </div>

            {/* FOIL-SCORE */}
            {(()=>{
              const conf = (activeDay===0 && stationCmp?.available) ? stationCmp.confidence : null;
              const adj = applyConfidence(dayData.dayScore, conf);
              const cc = classifyConfidence(conf);
              const scoreColor = sc2col(adj.score);
              return (
                <div style={{...S.card,marginBottom:12,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap",borderLeft:`3px solid ${scoreColor}`,background:`linear-gradient(90deg,${scoreColor}12 0%,${C.panel} 40%)`}}>
                  <div style={{textAlign:"center",minWidth:100}}>
                    <div style={{fontFamily:"monospace",fontWeight:900,fontSize:56,color:scoreColor,lineHeight:1}}>{adj.score}</div>
                    <div style={{fontFamily:"monospace",fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:4}}>Foil-Score</div>
                    {adj.adjusted && <div style={{fontSize:9,color:C.caution,marginTop:3}}>roh {dayData.dayScore} · justiert</div>}
                  </div>
                  <div style={{flex:1,minWidth:160}}>
                    {dayData.session && dayData.session.startHour!=null && dayData.dayScore>0 && (
                      <div style={{fontSize:14,color:C.go,fontFamily:"monospace",fontWeight:700,marginBottom:4}}>
                        ⏱ Beste Zeit: {String(dayData.session.startHour).padStart(2,"0")}–{String(dayData.session.endHour).padStart(2,"0")} Uhr
                      </div>
                    )}
                    <div style={{fontSize:11,color:C.muted}}>
                      {dayData.pickedGear
                        ? `${rider.weight}kg · ${dayData.pickedGear.name||dayData.pickedGear.wing+"m²"} (${dayData.pickedGear.wing}m²·${dayData.pickedGear.foil}cm²)`
                        : `${rider.weight}kg · ${rider.wingSize}m² · ${rider.foilFront}cm²${rider.planeKn?` · ab ${rider.planeKn}kn`:""}`}
                    </div>
                    {conf!=null && (
                      <div style={{marginTop:6,fontSize:11,color:cc.color}}>{cc.icon} {cc.label} ({conf}%)</div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* RECOMMENDATION */}
            <div style={{...S.card,borderLeft:`3px solid ${C.go}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span>🎯</span>
                <strong style={{color:C.go,fontSize:13}}>Equipment-Empfehlung</strong>
              </div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.9}} dangerouslySetInnerHTML={{__html:rec}} />
            </div>

            {/* FOIL WINDOW */}
            <div style={S.card}>
              <div style={S.sec}>Foil-Fenster Analyse — Rider-spezifisch + Foil-Score</div>
              {meas && <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",marginBottom:6}}>
                Weiß/rot = echte Station ({measured.source}{measured.latest?`, zuletzt ${measured.latest}`:""}) vs. Forecast (blau/orange)
              </div>}
              <div style={S.cwL}>
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={windData}><CartesianGrid {...gr} />
                    <XAxis dataKey="h" {...ax} interval={3} />
                    <YAxis yAxisId="l" {...ax} />
                    <YAxis yAxisId="r" orientation="right" domain={[0,100]} {...ax} tick={{...ax.tick,fill:C.go}} />
                    <Tooltip {...TT} />
                    <Legend wrapperStyle={{fontSize:10,fontFamily:"monospace",color:C.muted}} />
                    <ReferenceArea yAxisId="l" y1={cvt(dayData.win.optMin,windUnit)} y2={cvt(dayData.win.optMax,windUnit)} fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.3)" />
                    <ReferenceLine yAxisId="l" y={cvt(dayData.win.minWind,windUnit)} stroke={C.caution} strokeDasharray="4 3" />
                    <Line yAxisId="l" type="monotone" dataKey="wind" name={`Wind ${unitLabel(windUnit)}`} stroke={C.sky} strokeWidth={2} dot={false} />
                    <Line yAxisId="l" type="monotone" dataKey="gust" name={`Böen ${unitLabel(windUnit)}`} stroke={C.signal} strokeDasharray="4 3" strokeWidth={1.5} dot={false} />
                    {meas && windData.some(d=>d.mwind!=null) && <Line yAxisId="l" type="monotone" dataKey="mwind" name={`Ist Wind ${unitLabel(windUnit)}`} stroke={C.text} strokeWidth={2} dot={false} connectNulls />}
                    {meas && windData.some(d=>d.mgust!=null) && <Line yAxisId="l" type="monotone" dataKey="mgust" name={`Ist Böe ${unitLabel(windUnit)}`} stroke={C.stop} strokeDasharray="2 2" strokeWidth={1.5} dot={false} connectNulls />}
                    <Line yAxisId="r" type="monotone" dataKey="score" name="Foil-Score" stroke={C.go} strokeWidth={1.5} dot={false} strokeOpacity={0.8} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* QUICK STATS */}
            <div style={S.grid6}>
              {[
                {v:cvt(dayData.avgW,windUnit).toFixed(windUnit==="bf"?0:1),u:unitLabel(windUnit),l:"Ø Wind"},
                {v:cvt(dayData.maxG,windUnit).toFixed(windUnit==="bf"?0:1),u:unitLabel(windUnit),l:"Max Böe"},
                {v:dayData.maxT.toFixed(0),u:"°C",l:"Temperatur"},
                {v:Math.round(Math.max(...dayData.pres)),u:"hPa",l:"Luftdruck"},
                {v:dayData.maxTh,u:"",l:"Thermik-Index"},
                {v:`${cvt(dayData.win.optMin,windUnit).toFixed(windUnit==="bf"?0:1)}–${cvt(dayData.win.optMax,windUnit).toFixed(windUnit==="bf"?0:1)}`,u:unitLabel(windUnit),l:"Foil-Fenster"},
              ].map((s,i)=>(
                <div key={i} style={{...S.card,marginBottom:0,padding:"10px 12px"}}>
                  <div style={{fontFamily:"monospace",fontWeight:700,fontSize:19,color:"#fff"}}>{s.v}<span style={{fontSize:10,color:C.muted,marginLeft:3}}>{s.u}</span></div>
                  <div style={{fontFamily:"monospace",fontSize:9,color:C.muted,textTransform:"uppercase",marginTop:2}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* DETAILS DIVIDER */}
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 0 12px"}}>
              <div style={{flex:1,height:1,background:C.border}} />
              <span style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.14em",color:C.dim,textTransform:"uppercase"}}>Weitere Details</span>
              <div style={{flex:1,height:1,background:C.border}} />
            </div>
            {/* GRID 2: Direction + Temp */}
            <div style={S.grid2}>
              <div style={S.card}>
                <div style={S.sec}>Windrichtung (°)</div>
                <div style={S.cw}>
                  <ResponsiveContainer width="100%" height="100%">
                    <ScatterChart><CartesianGrid {...gr} />
                      <XAxis dataKey="idx" type="number" domain={[0,23]} {...ax} tickFormatter={v=>`${v}:00`} interval={5} />
                      <YAxis dataKey="dir" domain={[0,360]} {...ax} tickFormatter={v=>["N","NE","E","SE","S","SW","W","NW","N"][Math.round(v/45)]||v} />
                      <Tooltip {...TT} formatter={v=>[`${v}°`,"Richtung"]} />
                      <Scatter data={dirData} fill={C.caution} shape={<DirArrow/>} />
                    </ScatterChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div style={S.card}>
                <div style={S.sec}>Temperatur (°C)</div>
                <div style={S.cw}>
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={tempData}><CartesianGrid {...gr} />
                      <XAxis dataKey="h" {...ax} interval={3} />
                      <YAxis {...ax} />
                      <Tooltip {...TT} />
                      <Line type="monotone" dataKey="temp" stroke="#ff6b6b" strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* GRID 2: Thermik + Druck */}
            <div style={S.grid2}>
              <div style={S.card}>
                <div style={S.sec}>Thermik-Index (0–100)</div>
                <div style={S.cw}>
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={thData}><CartesianGrid {...gr} />
                      <XAxis dataKey="h" {...ax} interval={3} />
                      <YAxis domain={[0,100]} {...ax} />
                      <Tooltip {...TT} />
                      <Bar dataKey="th" radius={[2,2,0,0]}>
                        {thData.map((d,i)=><Cell key={i} fill={d.th<25?"rgba(61,220,132,0.75)":d.th<55?"rgba(245,185,66,0.75)":"rgba(232,64,64,0.75)"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div style={S.card}>
                <div style={S.sec}>Luftdruck (hPa)</div>
                <div style={S.cw}>
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={presData}><CartesianGrid {...gr} />
                      <XAxis dataKey="h" {...ax} interval={3} />
                      <YAxis {...ax} domain={["auto","auto"]} />
                      <Tooltip {...TT} />
                      <Line type="monotone" dataKey="pres" stroke="#a78bfa" strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* HISTORICAL */}
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={S.sec}>Historischer Vergleich — ERA5 Reanalyse vs. Prognose</span>
                <span style={{fontFamily:"monospace",fontSize:9,color:C.muted}}>{apiStatus.historical}</span>
              </div>
              <div style={S.cwL}>
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={histData}><CartesianGrid {...gr} />
                    <XAxis dataKey="label" {...ax} />
                    <YAxis {...ax} />
                    <Tooltip {...TT} />
                    <Legend wrapperStyle={{fontSize:10,fontFamily:"monospace",color:C.muted}} />
                    <Bar dataKey="era5" name={`ERA5 Ø ${unitLabel(windUnit)}`} fill="rgba(58,154,217,0.55)" stroke={C.sky} strokeWidth={1} radius={[3,3,0,0]} />
                    <Bar dataKey="prog" name={`Prognose Ø ${unitLabel(windUnit)}`} fill="rgba(61,220,132,0.55)" stroke={C.go} strokeWidth={1} radius={[3,3,0,0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* THERMIK BOX */}
            <div style={{...S.card,borderLeft:`3px solid ${C.caution}`,display:"flex",gap:12}}>
              <span style={{fontSize:22}}>🌡️</span>
              <div>
                <strong style={{color:C.caution,fontSize:13}}>Thermik-Analyse — {dayData.thInfo.label}</strong>
                <p style={{fontSize:12,color:C.muted,marginTop:4,lineHeight:1.7}}>
                  {dayData.thInfo.desc}
                  {dayData.sb.active&&<><br/><br/>🌊 <b style={{color:C.sky}}>Thermische Brise aktiv:</b> {dayData.regime.label} ({dayData.regime.origin}) +{fmtW(dayData.sb.boost,windUnit)} um ~{dayData.regime.peakHour}:00 Uhr. Ausrichtungsgrad {Math.round(dayData.sb.align*100)}%.</>}
                </p>
              </div>
            </div>

            {/* STATION vs MODEL COMPARISON (confidence) */}
            <div style={{...S.card,borderLeft:`3px solid ${C.sky}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                <span style={S.sec}>🛰 Station ↔ Modell Abgleich → Vertrauens-Score</span>
                <span style={{fontFamily:"monospace",fontSize:9,color:C.muted}}>
                  {stationCmpStatus==="loading"?"⏳ Abgleich…":stationCmpStatus==="ok"?"✅ aktiv":stationCmpStatus==="unavailable"?"○ keine Station":""}
                </span>
              </div>

              {stationCmpStatus==="loading" && (
                <p style={{fontSize:11,color:C.dim}}>Echte Stationsdaten werden mit dem Modell verglichen…</p>
              )}

              {stationCmpStatus==="unavailable" && (
                <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>
                  Kein Stations-Backend erreichbar. Der Vertrauens-Score benötigt den Proxy
                  (<code style={{color:C.caution}}>proxy-server.js</code>) mit gültigem Weatherbit-API-Key auf deinem Host.
                  Bis dahin basiert die Bewertung allein auf Modell + Rider-Angaben.
                </div>
              )}

              {stationCmpStatus==="ok" && stationCmp?.available && (()=>{
                const cc = classifyConfidence(stationCmp.confidence);
                const cur = stationCmp.current;
                return (
                  <div>
                    {/* Confidence bar */}
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <span style={{fontFamily:"monospace",fontWeight:900,fontSize:32,color:cc.color,lineHeight:1}}>{stationCmp.confidence ?? "–"}%</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,color:cc.color,marginBottom:4}}>{cc.icon} {cc.label}</div>
                        <div style={{height:6,background:C.bg,borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${stationCmp.confidence ?? 0}%`,background:cc.color,transition:"width .4s"}} />
                        </div>
                      </div>
                    </div>

                    {/* Side-by-side comparison */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
                      <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Station (real)</div>
                        <div style={{fontSize:12,color:C.text}}>💨 {cur?.ok && cur.wind!=null?fmtW(cur.wind,windUnit):"–"}</div>
                        <div style={{fontSize:11,color:C.muted}}>🧭 {cur?.ok && cur.dir!=null?Math.round(cur.dir)+"°":"–"} · 🌡 {cur?.ok && cur.temp!=null?cur.temp.toFixed(0)+"°":"–"}</div>
                        {cur?.station_id && <div style={{fontFamily:"monospace",fontSize:8,color:C.dim,marginTop:4}}>ID {cur.station_id}</div>}
                      </div>
                      <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Modell</div>
                        <div style={{fontSize:12,color:C.text}}>💨 {stationCmp.modelCurrentWind!=null?fmtW(stationCmp.modelCurrentWind,windUnit):"–"}</div>
                        <div style={{fontSize:11,color:C.muted}}>🧭 {stationCmp.modelCurrentDir!=null?Math.round(stationCmp.modelCurrentDir)+"°":"–"}</div>
                      </div>
                      <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Ø Wind (Bias-Fenster)</div>
                        <div style={{fontSize:11,color:C.text}}>Station {stationCmp.stationHistMeanWind!=null?fmtW(stationCmp.stationHistMeanWind,windUnit):"–"}</div>
                        <div style={{fontSize:11,color:C.muted}}>Modell {stationCmp.modelHistMeanWind!=null?fmtW(stationCmp.modelHistMeanWind,windUnit):"–"}</div>
                        {stationCmp.bias?.ok && (
                          <div style={{fontFamily:"monospace",fontSize:8,color:C.dim,marginTop:3}}>
                            {stationCmp.bias.station?.name} · {stationCmp.bias.station?.km}km · {stationCmp.bias.samples}h · {stationCmp.bias.periodStart}…{stationCmp.bias.periodEnd}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Divergence notes */}
                    {stationCmp.notes?.length>0 && (
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {stationCmp.notes.map((n,i)=>(
                          <span key={i} style={{fontFamily:"monospace",fontSize:10,color:C.muted,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:4,padding:"3px 8px"}}>{n}</span>
                        ))}
                      </div>
                    )}

                    <div style={{fontSize:9,color:C.dim,marginTop:10,lineHeight:1.5}}>
                      Großer Unterschied zwischen Station und Modell ⇒ niedriger Vertrauens-Score ⇒ der Foil-Score (heute) wird Richtung neutral gedämpft. Aktuell: {cur?.source || "Weatherbit"}. Hist. Bias: Meteostat-Station vs. Open-Meteo-Archiv (gleiches Zeitfenster).
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* NEARBY STATIONS */}
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                <span style={S.sec}>📡 Echte Wetterstationen{nearbyRadius?` (Umkreis ${nearbyRadius} km)`:""}</span>
                <span style={{fontFamily:"monospace",fontSize:9,color:C.muted}}>
                  {nearbyStatus==="loading"?"⏳ lädt…":nearbyStatus==="live"?"✅ Messung+Modell":nearbyStatus==="model"?"≈ Modellwind":nearbyStatus==="meta"?"○ nur Stationsinfo":nearbyStatus==="unavailable"?"– keine Stationen":""}
                </span>
              </div>
              {nearbyStatus==="loading" && (
                <p style={{fontSize:11,color:C.dim}}>Echte Stationen im Umkreis werden gesucht…</p>
              )}
              {nearbyStatus==="unavailable" && (
                <p style={{fontSize:11,color:C.dim}}>Keine Stationen gefunden bzw. Stationsliste nicht erreichbar.</p>
              )}
              {nearbyStations.length>0 && (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}}>
                  {nearbyStations.map((st,i)=>{
                    const dirTxt = st.dir!=null ? ["N","NO","O","SO","S","SW","W","NW"][Math.round(st.dir/45)%8] : "–";
                    return (
                      <div key={i} style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"10px 12px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:6}}>
                          <b style={{color:C.text,fontSize:12}}>{st.name}</b>
                          <span style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                            <span style={{fontFamily:"monospace",fontSize:8,color:st.src==="obs"?C.go:C.muted}}
                              title={st.src==="obs"?"Echte Stationsmessung (Weatherbit)":"Modellwind am Stationsstandort (Open-Meteo)"}>
                              {st.src==="obs"?"● Messung":st.src==="model"?"≈ Modell":""}
                            </span>
                            <span style={{fontFamily:"monospace",fontSize:9,color:C.muted}}>{st.km} km</span>
                          </span>
                        </div>
                        <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:11,color:C.muted}}>
                          <span style={{color:C.sky}}>💨 {st.wind!=null?fmtW(st.wind,windUnit):"–"}</span>
                          <span style={{color:C.signal}}>⬆ {st.gust!=null?fmtW(st.gust,windUnit):"–"}</span>
                          <span>🧭 {dirTxt}</span>
                          <span>🌡 {st.temp!=null?st.temp.toFixed(0)+"°":"–"}</span>
                        </div>
                        <div style={{fontFamily:"monospace",fontSize:8,color:C.dim,marginTop:5}}>
                          {st.lat.toFixed(3)}°, {st.lon.toFixed(3)}°{st.country?` · ${st.country}`:""}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{fontSize:9,color:C.dim,marginTop:8,lineHeight:1.5}}>
                Echte Messstationen im Umkreis (Quelle: Meteostat). Windwerte: Standard ist aktueller Modellwind am Stationsstandort (Open-Meteo, ≈ Modell); die nächstgelegenen Stationen zeigen echte Messungen (● Messung, Weatherbit), solange das Tageskontingent reicht.
              </div>
            </div>

            {/* MANUAL EXTERNAL STATIONS */}
            <div style={S.card}>
              <div style={S.sec}>🔗 Eigene Wetterstation hinzufügen</div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <input type="url" value={stationUrl} onChange={e=>setStationUrl(e.target.value)}
                  placeholder="https://wetterstation.example.com/data"
                  style={{...S.inp,flex:1}} />
                <button style={{...S.btn,fontSize:11,padding:"5px 12px"}} onClick={()=>{if(stationUrl.trim()){setStations(s=>[...s,{url:stationUrl.trim()}]);setStationUrl("");}}}>
                  Hinzufügen
                </button>
              </div>
              {stations.map((st,i)=>(
                <div key={i} style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:4,padding:"8px 12px",marginBottom:6,fontSize:11,color:C.muted}}>
                  <b style={{color:C.text,display:"block",marginBottom:3}}>{st.url}</b>
                  CORS-eingeschränkt im Browser — Daten bitte direkt auf der Seite prüfen.
                </div>
              ))}
              {!stations.length&&<p style={{fontSize:11,color:C.dim}}>Noch keine eigenen Stationen konfiguriert.</p>}
            </div>
          </>
        )}
      </div>

      {/* FEEDBACK MODAL */}
      {showFeedback&&(
        <FeedbackModal loc={loc} onClose={()=>setShowFeedback(false)}
          onCalibrated={cal=>setSpotCal(cal&&cal.rolling!=null?cal:null)}
          forecast={forecast ? {source:"foil-score",
            predictedScore:(activeDay===0&&dayData)?dayData.dayScore:null,
            predictedWindKt:(activeDay===0&&dayData)?dayData.midW:null} : null} />
      )}

      {/* LOC MODAL */}
      {showLoc&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.panel,border:`1px solid ${C.border2}`,borderRadius:8,width:"100%",maxWidth:460}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
              <strong style={{fontFamily:"monospace",fontSize:14}}>Standort konfigurieren</strong>
              <button onClick={()=>setShowLoc(false)} style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{padding:16}}>
              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {["preset","custom"].map(tab=>(
                  <button key={tab} onClick={()=>setLocTab(tab)} style={{background:locTab===tab?C.signal:"none",border:`1px solid ${locTab===tab?C.signal:C.border2}`,color:locTab===tab?"#fff":C.muted,borderRadius:4,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>
                    {tab==="preset"?"Voreinstellungen":"Maps-Link"}
                  </button>
                ))}
              </div>

              {/* Mein Standort (GPS) */}
              <button onClick={useMyLocation} disabled={geoStatus==="loading"}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                  background:geoStatus==="loading"?C.surface:"rgba(58,154,217,0.12)",
                  border:`1px solid ${C.sky}`,color:C.sky,borderRadius:6,
                  padding:"10px 12px",fontSize:13,fontFamily:"monospace",cursor:geoStatus==="loading"?"wait":"pointer",
                  marginBottom:12}}>
                {geoStatus==="loading"
                  ? <><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Standort wird ermittelt…</>
                  : <>📍 Meinen aktuellen Standort verwenden</>}
              </button>
              {geoError && (
                <div style={{fontSize:11,color:C.caution,lineHeight:1.5,background:"rgba(245,185,66,0.08)",
                  border:`1px solid ${C.caution}`,borderRadius:4,padding:"6px 10px",marginBottom:12}}>
                  ⚠️ {geoError}
                </div>
              )}
              {recent.length>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{fontFamily:"monospace",fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Zuletzt verwendet</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {recent.map((r,i)=>(
                      <button key={i} onClick={()=>{ setLoc(r); pushRecent(r,{active:true}); setShowLoc(false); }}
                        style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:4,color:C.text,textAlign:"left",padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                        <span>
                          <b style={{display:"block",fontSize:13}}>{r.name}</b>
                          <span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{(+r.lat).toFixed(4)}°N {(+r.lon).toFixed(4)}°E</span>
                        </span>
                        <span style={{fontSize:12,color:C.sky}}>↵</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div style={{fontSize:9,color:C.dim,textAlign:"center",marginBottom:12,letterSpacing:"0.05em"}}>
                — oder manuell wählen —
              </div>
              {locTab==="preset"&&(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {PRESETS.map((p,i)=>(
                    <button key={i} onClick={()=>setSelPreset(i)} style={{background:C.bg,border:`1px solid ${selPreset===i?C.signal:C.border2}`,borderRadius:4,color:C.text,textAlign:"left",padding:"8px 12px",cursor:"pointer"}}>
                      <b style={{display:"block",fontSize:13}}>{p.name}</b>
                      <span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{p.lat}°N {p.lon}°E</span>
                    </button>
                  ))}
                </div>
              )}
              {locTab==="custom"&&(()=>{
                const parsed = parseLocationInput(custom.link);
                const ok = parsed && !parsed.error;
                return (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <label style={{fontFamily:"monospace",fontSize:10,color:C.muted,display:"block",marginBottom:4}}>Google Maps Link oder Koordinaten</label>
                    <textarea value={custom.link} rows={3}
                      onChange={e=>{setCustom(c=>({...c,link:e.target.value}));setLinkError("");}}
                      placeholder="https://www.google.com/maps/@36.9833,21.6667,14z&#10;oder: 36.9833, 21.6667"
                      style={{...S.inp,width:"100%",resize:"vertical",lineHeight:1.4}} />
                  </div>
                  <div>
                    <label style={{fontFamily:"monospace",fontSize:10,color:C.muted,display:"block",marginBottom:4}}>Ortsname (optional)</label>
                    <input value={custom.name} onChange={e=>setCustom(c=>({...c,name:e.target.value}))}
                      placeholder={parsePlaceName(custom.link)||"z.B. Mein Spot"}
                      style={{...S.inp,width:"100%"}} />
                  </div>
                  {custom.link && ok && (
                    <div style={{fontSize:11,color:C.go,fontFamily:"monospace",background:"rgba(61,220,132,0.08)",border:`1px solid ${C.go}`,borderRadius:4,padding:"6px 10px"}}>
                      ✅ Erkannt: {parsed.lat.toFixed(4)}°N, {parsed.lon.toFixed(4)}°E
                    </div>
                  )}
                  {custom.link && parsed && parsed.error && (
                    <div style={{fontSize:11,color:C.caution,lineHeight:1.5,background:"rgba(245,185,66,0.08)",border:`1px solid ${C.caution}`,borderRadius:4,padding:"6px 10px"}}>
                      ⚠️ {parsed.error}
                    </div>
                  )}
                  {linkError && (
                    <div style={{fontSize:11,color:C.stop,fontFamily:"monospace"}}>{linkError}</div>
                  )}
                  <div style={{fontSize:10,color:C.dim,lineHeight:1.5}}>
                    💡 In Google Maps auf den Ort tippen/klicken → URL aus der Adresszeile kopieren. Der Link enthält die Koordinaten nach dem @-Zeichen.
                  </div>
                </div>
                );
              })()}
              <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}>
                <button style={{...S.btn,background:"transparent",border:`1px solid ${C.border2}`,color:C.muted}} onClick={()=>{
                  const nl = resolveLoc(); if(!nl) return;
                  setLoc(nl); pushRecent(nl); setLinkError(""); setShowLoc(false);
                }}>Nur übernehmen</button>
                <button style={S.btn} onClick={()=>{
                  const nl = resolveLoc(); if(!nl) return;
                  setLoc(nl); pushRecent(nl,{active:true}); setLinkError(""); setShowLoc(false);
                }}>Übernehmen & merken ★</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"8px 20px",textAlign:"center",fontFamily:"monospace",fontSize:9,color:C.muted,display:"flex",justifyContent:"center",alignItems:"center",gap:24,flexWrap:"wrap"}}>
        <span>WindFoil Weather Intelligence v3.8.7</span>
        <span>Open-Meteo · ERA5 ECMWF · Rider-Input</span>
        <span>Standort: {loc.name}</span>
        <a href="/help.html" style={{color:C.sky,textDecoration:"none"}}>❓ Hilfe</a>
        <button onClick={()=>{setAdminOpen(true);setAdminErr("");setAdminOut("");setAdminTab("actions");setUsersMsg("");}}
          title="Admin"
          style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:12,padding:0}}>⚙</button>
      </div>

      {/* ADMIN MODAL */}
      {adminOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.panel,border:`1px solid ${C.border2}`,borderRadius:8,width:"100%",maxWidth:560}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
              <strong style={{fontFamily:"monospace",fontSize:14}}>⚙ Admin</strong>
              <button onClick={()=>{setAdminOpen(false);setAdminAuthed(false);setAdminToken("");setAdminPw("");setAdminOut("");setAdminErr("");setAdminTab("actions");setUsers([]);setUsersMsg("");setPwInputs({});}}
                style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{padding:16}}>

              {!adminAuthed ? (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <label style={{fontFamily:"monospace",fontSize:10,color:C.muted}}>Admin-Passwort</label>
                  <input type="password" value={adminPw} autoFocus
                    onChange={e=>setAdminPw(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter") adminLogin();}}
                    style={{...S.inp,width:"100%",fontSize:14}} />
                  <button style={{...S.btn,opacity:adminBusy?0.6:1}} disabled={adminBusy} onClick={adminLogin}>
                    {adminBusy?"Prüfe…":"Anmelden"}
                  </button>
                  <p style={{fontSize:9,color:C.dim,lineHeight:1.5}}>
                    Das Passwort wird serverseitig geprüft (windfoil.env). Es wird nicht im Browser gespeichert.
                  </p>
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"flex",gap:6}}>
                    {[["actions","Aktionen"],["users","Benutzer"]].map(([t,l])=>(
                      <button key={t} onClick={()=>{ setAdminTab(t); if(t==="users") loadUsers(); }}
                        style={{background:adminTab===t?C.signal:"none",border:`1px solid ${adminTab===t?C.signal:C.border2}`,color:adminTab===t?"#fff":C.muted,borderRadius:4,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>{l}</button>
                    ))}
                  </div>

                  {adminTab==="actions" && (<>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button style={{...S.btn,opacity:adminBusy?0.6:1}} disabled={adminBusy}
                      onClick={()=>adminRun("deploy","Deployment")}>🚀 Deploy starten</button>
                    <button style={{...S.btn,background:"transparent",border:`1px solid ${C.sky}`,color:C.sky,opacity:adminBusy?0.6:1}} disabled={adminBusy}
                      onClick={()=>adminRun("restart-proxy","Proxy-Neustart")}>♻ Proxy neu starten</button>
                    <button style={{...S.btn,background:"transparent",border:`1px solid ${C.muted}`,color:C.muted,opacity:adminBusy?0.6:1}} disabled={adminBusy}
                      onClick={()=>adminRun("status","Status")}>📊 Status</button>
                  </div>
                  {adminBusy && <div style={{fontSize:11,color:C.caution}}>⏳ läuft… (kann bis zu 2 Min dauern)</div>}
                  {adminOut && (
                    <pre style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"10px 12px",fontSize:11,color:C.text,fontFamily:"monospace",whiteSpace:"pre-wrap",maxHeight:340,overflow:"auto",margin:0}}>{adminOut}</pre>
                  )}
                  </>)}

                  {adminTab==="users" && (
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>{users.length} Benutzer</span>
                        <button style={S.btnG} disabled={adminBusy} onClick={loadUsers}>↻ Aktualisieren</button>
                      </div>
                      {usersMsg && <div style={{fontSize:11,color:usersMsg.startsWith("✓")?C.go:C.caution}}>{usersMsg}</div>}
                      {users.length===0 && !adminBusy && <div style={{fontSize:11,color:C.dim}}>Keine Benutzer gefunden.</div>}
                      {users.map(u=>(
                        <div key={u.id} style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:13,color:C.text,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                                {u.name||"—"}
                                <span style={{fontSize:10,color:u.disabled?C.stop:C.go}}>{u.disabled?"● gesperrt":"● aktiv"}</span>
                              </div>
                              <div style={{fontSize:11,color:C.muted,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis"}}>{u.email}</div>
                            </div>
                            <button disabled={adminBusy} onClick={()=>toggleUser(u)}
                              style={{...S.btnG,borderColor:u.disabled?C.go:C.stop,color:u.disabled?C.go:C.stop,opacity:adminBusy?0.6:1}}>
                              {u.disabled?"Freischalten":"Sperren"}
                            </button>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <input type="text" autoComplete="off" placeholder="Neues Passwort (min. 10)"
                              value={pwInputs[u.id]||""} onChange={e=>setPwInputs(p=>({...p,[u.id]:e.target.value}))}
                              style={{...S.inp,flex:1,fontSize:12}} />
                            <button disabled={adminBusy} style={S.btnG} onClick={()=>resetUserPw(u)}>PW setzen</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {adminErr && <div style={{fontSize:11,color:C.stop,marginTop:10}}>⚠️ {adminErr}</div>}
            </div>
          </div>
        </div>
      )}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

    const boot=document.getElementById("boot"); if(boot) boot.remove();
    ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate><App/></AuthGate>);
  </script></body></html>
