const { useState, useEffect, useCallback, useRef } = React;
const { LineChart, Line, BarChart, Bar, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, ReferenceArea, Cell } = Recharts;

// WindFoil Weather Intelligence v3.8.7
// Changelog: Robust API fallback, demo-mode, independent fetches, timeout handling

// Changelog v2.2.0: Wind units – kn, BF, m/s switchable (display only; internals stay m/s)

// ── Unit conversion (all internals in m/s) ───────────────────────────────────
const msToKn  = ms => ms * 1.94384;
const knToMs  = kn => kn / 1.94384;
const msToBf  = ms => {
  if(ms<0.3) return 0; if(ms<1.6) return 1; if(ms<3.4) return 2;
  if(ms<5.5) return 3; if(ms<8.0) return 4; if(ms<10.8) return 5;
  if(ms<13.9) return 6; if(ms<17.2) return 7; if(ms<20.8) return 8;
  if(ms<24.5) return 9; if(ms<28.5) return 10; if(ms<32.7) return 11;
  return 12;
};
const BF_LABEL = ["0 Windstille","1 Leicht","2 Leicht","3 Leise","4 Mäßig","5 Frisch","6 Stark","7 Steif","8 Stürmisch","9 Sturm","10 Schwerer Sturm","11 Orkan","12 Orkan"];
function cvt(ms, unit) {
  if(unit==="kn") return Math.round(msToKn(ms)*10)/10;
  if(unit==="bf") return msToBf(ms);
  return Math.round(ms*10)/10; // m/s
}
function fmtW(ms, unit) {
  if(unit==="kn") return `${cvt(ms,"kn").toFixed(1)} kn`;
  if(unit==="bf") return `${cvt(ms,"bf")} BF`;
  return `${cvt(ms,"ms").toFixed(1)} m/s`;
}
function unitLabel(unit) {
  return unit==="kn"?"kn":unit==="bf"?"BF":"m/s";
}
// Convert a full array ms→display unit
function cvtArr(arr, unit) { return arr.map(v=>cvt(v,unit)); }

// Two full palettes. The light theme keeps the dark theme's structure and accent
// language (same tokens), just inverted for a crisp bright look. Accents are
// darkened slightly so they stay legible on white.
const THEMES = {
  dark: {
    bg:"#0a0e14",surface:"#111820",panel:"#151d28",border:"#1e2d3d",border2:"#243040",
    sky:"#3a9ad9",signal:"#f07820",caution:"#f5b942",go:"#3ddc84",stop:"#e84040",
    text:"#d8e4f0",muted:"#5a7a96",dim:"#2a3d52",
    headerBg:"rgba(10,14,20,.97)",gridStroke:"rgba(255,255,255,0.05)",
  },
  light: {
    bg:"#e7edf3",surface:"#f3f6fa",panel:"#ffffff",border:"#cdd9e6",border2:"#b6c6d6",
    sky:"#1f7fc0",signal:"#dd6510",caution:"#b07d10",go:"#149048",stop:"#d62828",
    text:"#13202e",muted:"#5b7186",dim:"#9fb1c2",
    headerBg:"rgba(247,249,252,.97)",gridStroke:"rgba(0,0,0,0.06)",
  },
};
// Live palette — mutated in place by applyTheme() so the ~280 C.* reads and the

// without threading colors through every component.
const C = { ...THEMES.dark };

// ── Demo data generator (realistic Navarino/May values) ──────────────────────
// ── Demo data v2.2.0 ─────────────────────────────────────────────────────────
// Key fix: timestamps generated as "YYYY-MM-DDTHH:00" using LOCAL calendar date
// so dayStartIndices.findIndex("YYYY-MM-DD") always matches correctly
// regardless of user timezone. No Date.toISOString() (= UTC) used.

function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

// ── Parse coordinates from a Google Maps link or raw coords v2.2.0 ───────────
// Supports formats:
//   https://www.google.com/maps/@36.9833,21.6667,14z
//   https://maps.google.com/?q=36.9833,21.6667
//   https://www.google.com/maps/place/.../@36.98,21.66,15z/data=...!3d36.98!4d21.66
//   https://maps.app.goo.gl/...  (shortened — cannot resolve client-side, user warned)
//   "36.9833, 21.6667"  (plain coordinates)
function parseLocationInput(input) {
  if(!input) return null;
  const str = input.trim();

  // Shortened goo.gl links redirect server-side — can't resolve in browser
  if(/maps\.app\.goo\.gl|goo\.gl\/maps/.test(str)) {
    return { error: "Kurz-Link (goo.gl) kann im Browser nicht aufgelöst werden. Bitte den Link in Maps öffnen und die lange URL oder die Koordinaten kopieren." };
  }

  // Try @lat,lon (most common in maps URLs)
  let m = str.match(/@(-?\d{1,3}\.\d+),\s*(-?\d{1,3}\.\d+)/);
  if(m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

  // Try !3dLAT!4dLON (embedded in /data= part — most precise place pin)
  const m3 = str.match(/!3d(-?\d{1,3}\.\d+)/);
  const m4 = str.match(/!4d(-?\d{1,3}\.\d+)/);
  if(m3 && m4) return { lat: parseFloat(m3[1]), lon: parseFloat(m4[1]) };

  // Try q=lat,lon or query=lat,lon or ll=lat,lon
  m = str.match(/[?&](?:q|query|ll|sll)=(-?\d{1,3}\.\d+),\s*(-?\d{1,3}\.\d+)/);
  if(m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

  // Plain "lat, lon"
  m = str.match(/^\s*(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*$/);
  if(m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

  return { error: "Keine Koordinaten gefunden. Tipp: in Google Maps auf den Ort klicken, die URL aus der Adresszeile kopieren (sollte @Lat,Lon enthalten)." };
}

// Extract a readable place name from a maps URL (the /place/<name>/ segment)
function parsePlaceName(input) {
  if(!input) return "";
  const m = input.match(/\/place\/([^/@]+)/);
  if(m) {
    try { return decodeURIComponent(m[1].replace(/\+/g," ")).split(",")[0]; }
    catch(e){ return m[1].replace(/\+/g," ").split(",")[0]; }
  }
  return "";
}

function generateDemoDay(lat, lon, dayOffset) {
  // Build the target LOCAL date for this day
  const base = new Date();
  base.setDate(base.getDate() + dayOffset);
  const dateStr = localDateStr(base); // e.g. "2026-05-31"
  const isNavarino = Math.abs(lat - 36.98) < 0.5;
  const windBase = isNavarino ? 4.2 : 3.8;
  const tempBase = isNavarino ? 22  : 20;
  const times=[], winds=[], gusts=[], dirs=[], temps=[], pres=[], cape=[], li=[], cloud=[], humid=[];
  for (let h = 0; h < 24; h++) {
    // Timestamp purely from local calendar — no UTC conversion
    times.push(`${dateStr}T${String(h).padStart(2,"0")}:00`);
    const seaFactor = h>=10 && h<=19 ? Math.sin(Math.PI*(h-10)/9) : 0;
    const nightDip  = h<7 ? 0.55 : h<10 ? 0.75 : 1.0;
    const w = Math.max(0.5, windBase*nightDip + seaFactor*3.8 + (Math.random()-0.5)*0.8 + dayOffset*0.3);
    winds.push(Math.round(w*10)/10);
    gusts.push(Math.round(w*(1.25+Math.random()*0.2)*10)/10);
    const dir = h<10 ? 45+Math.random()*30 : 240+Math.random()*40;
    dirs.push(Math.round(dir));
    const tVal = tempBase + (h<6 ? -3 : h<14 ? (h-6)*1.1 : (24-h)*0.6-1) + Math.random()*0.8 - dayOffset*0.5;
    temps.push(Math.round(tVal*10)/10);
    pres.push(Math.round((1013+Math.sin(h/8)*1.5+Math.random()*0.5-dayOffset*0.3)*10)/10);
    cape.push(h>=11&&h<=17 ? Math.round(Math.random()*600) : 0);
    li.push(h>=11&&h<=17 ? -(Math.random()*2.5) : 1+Math.random());
    cloud.push(Math.round(Math.random()*30+(h>14?10:0)));
    humid.push(Math.round(55+Math.random()*20-seaFactor*8));
  }
  return{time:times,windspeed_10m:winds,windgusts_10m:gusts,winddirection_10m:dirs,
         temperature_2m:temps,surface_pressure:pres,cape,lifted_index:li,cloudcover:cloud,relativehumidity_2m:humid};
}

function buildDemoForecast(lat, lon) {
  const keys=["time","windspeed_10m","windgusts_10m","winddirection_10m","temperature_2m",
               "surface_pressure","cape","lifted_index","cloudcover","relativehumidity_2m"];
  const merged = Object.fromEntries(keys.map(k=>[k,[]]));
  for(let d=0; d<7; d++){
    const day = generateDemoDay(lat, lon, d);
    keys.forEach(k => merged[k].push(...day[k]));
  }
  return { hourly: merged };
}

function buildDemoHistorical(lat, lon) {
  const times=[], winds=[], temps=[];
  for(let d=7; d>=1; d--){
    const day = generateDemoDay(lat, lon, -d);
    times.push(...day.time); winds.push(...day.windspeed_10m); temps.push(...day.temperature_2m);
  }
  return { hourly:{ time:times, windspeed_10m:winds, temperature_2m:temps } };
}

// ── API with timeout + fallback ───────────────────────────────────────────────
async function fetchWithTimeout(url, ms = 7000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

// Pick the best high-resolution model for a given spot.
// Météo-France AROME-HD (1.5 km) is the gold standard for Alpine/lake thermal
// winds (Lago di Garda: Ora/Peler etc.). Its grid covers France plus most of
// mainland Italy up to ~lon 16 — Torbole, Venedig, Rom, Sardinien are inside;
// Sizilien / Süd-Apulien fall outside and use Open-Meteo best_match instead.
function pickForecastModel(lat, lon) {
  const inAromeItaly = lat >= 36 && lat <= 47.2 && lon >= 6.5 && lon <= 16;
  return inAromeItaly ? "meteofrance_arome_france_hd" : "";
}

const MODEL_LABELS = {
  meteofrance_arome_france_hd:"AROME-HD 1.5km",
  arome_best_max:"AROME-HD + Best (max/h)",
};

// Local thermal-wind regime — the dominant afternoon thermal-breeze direction,
// a human label, and its typical peak hour. Geography differs per spot (the
// Gardasee's "Ora" funnels up the lake from the south; a coastal sea breeze
// blows W-SW off the open sea), so the alignment target must be spot-specific
// instead of the old hard-coded 250°.
// Lago di Garda bounding box (Torbole/Riva north end down to the south basin).
function isGardaSpot(lat, lon){
  return lat>=45.4 && lat<=45.95 && lon>=10.5 && lon<=11.0;
}
function thermalRegime(lat, lon){
  // Lago di Garda — afternoon "Ora" comes up the lake from the south.
  if(isGardaSpot(lat,lon))
    return { dir:195, label:"Ora (Süd)", origin:"vom Gardasee-Süden", peakHour:15 };
  // Generic coastal sea breeze.
  return { dir:250, label:"Meeresbrise (W-SW)", origin:"vom Meer", peakHour:14 };
}

function hasWindData(fc){
  return fc && fc.hourly && Array.isArray(fc.hourly.windspeed_10m)
    && fc.hourly.windspeed_10m.some(v => v != null);
}

// Per-hour upper-envelope merge of two forecasts that share the same hourly
// time grid. For each hour keep whichever model reports the stronger wind, and
// carry THAT model's gust + direction so speed/dir stay self-consistent.
// Garda's Pelèr/Ora are channeled valley winds a single grid often under-
// forecasts; the envelope recovers the stronger, more realistic value (AROME
// resolves the morning Pelèr better, best_match/ICON the afternoon Ora peak).
function mergeForecastsMax(a, b){
  if(!hasWindData(a)) return b;
  if(!hasWindData(b)) return a;
  // Both come from forecast_days=7 + timezone=auto, so they start at the same
  // local 00:00; bail out (use a) if the grids don't actually line up.
  if(a.hourly.time?.[0] !== b.hourly.time?.[0]) return a;
  const out = JSON.parse(JSON.stringify(a));
  const ha=a.hourly, hb=b.hourly, ho=out.hourly;
  const n = Math.min(ha.windspeed_10m.length, hb.windspeed_10m.length);
  for(let i=0;i<n;i++){
    const wa=ha.windspeed_10m[i], wb=hb.windspeed_10m[i];
    if(wb!=null && (wa==null || wb>wa)){
      ho.windspeed_10m[i]=wb;
      if(hb.windgusts_10m?.[i]!=null)      ho.windgusts_10m[i]=hb.windgusts_10m[i];
      if(hb.winddirection_10m?.[i]!=null)  ho.winddirection_10m[i]=hb.winddirection_10m[i];
    }
  }
  return out;
}

// ── Pelèr boost (channeled north wind, Lago di Garda) ─────────────────────────
// The Pelèr funnels DOWN the lake from the north (night → forenoon). It is a
// narrow, terrain-channeled jet that even AROME-HD 1.5km systematically under-
// forecasts BOTH in strength AND direction: on 2026-06-23 the measured Torbole
// station ran ~1.4–2× the model and blew steady N (~360°), while the grid put
// the same flow at ~30–100° (E) in the morning and even drew a phantom afternoon
// S-"Ora" that never filled. A narrow north window therefore misses it. At this
// north-end spot the forenoon wind is Pelèr-dominated regardless of the grid's
// exact bearing, so we lift every forenoon hour whose direction is NOT the
// southern Ora sector. Heuristic first pass — should be auto-calibrated against
// the real station feed (/api/station/measured) once enough days are logged.
const PELER = { windFactor:1.40, gustFactor:1.45, oraBearing:195, oraGuard:70, lastHour:12 };
function isPelerHour(hour, dir){
  if(dir==null || hour==null || hour>PELER.lastHour) return false;
  return angDiff(dir, PELER.oraBearing) > PELER.oraGuard; // not within 70° of the S-Ora
}
function applyPelerBoost(fc, lat, lon){
  if(!isGardaSpot(lat,lon) || !hasWindData(fc)) return fc;
  const h=fc.hourly, dirs=h.winddirection_10m||[], times=h.time||[];
  let boosted=0;
  for(let i=0;i<h.windspeed_10m.length;i++){
    const hour = times[i] ? parseInt(times[i].slice(11,13),10) : null;
    if(!isPelerHour(hour, dirs[i])) continue;
    if(h.windspeed_10m[i]!=null) h.windspeed_10m[i]=Math.round(h.windspeed_10m[i]*PELER.windFactor*100)/100;
    if(h.windgusts_10m && h.windgusts_10m[i]!=null) h.windgusts_10m[i]=Math.round(h.windgusts_10m[i]*PELER.gustFactor*100)/100;
    boosted++;
  }
  if(boosted) fc.__pelerBoost = true;
  return fc;
}

async function tryFetchForecast(lat, lon) {
  const base = {
    latitude:lat, longitude:lon,
    hourly:"temperature_2m,windspeed_10m,windgusts_10m,winddirection_10m,surface_pressure,relativehumidity_2m,cloudcover,cape,lifted_index",
    wind_speed_unit:"ms", forecast_days:7, timezone:"auto",
  };
  const fetchModel = (models) => {
    const p = new URLSearchParams(models ? { ...base, models } : base);
    return fetchWithTimeout(`https://api.open-meteo.com/v1/forecast?${p}`);
  };
  const model = pickForecastModel(lat, lon);
  if (model) {
    try {
      // Fetch the high-res model AND the global best_match in parallel, then
      // take the per-hour stronger wind. A single grid (even AROME 1.5km)
      // under-forecasts the channeled Gardasee winds; the envelope is closer
      // to reality, especially the afternoon Ora peak.
      const [arome, best] = await Promise.all([
        fetchModel(model).catch(()=>null),
        fetchModel("").catch(()=>null),
      ]);
      if (hasWindData(arome) && hasWindData(best)) {
        const merged = mergeForecastsMax(arome, best);
        merged.__model = "arome_best_max";
        return merged;
      }
      // AROME's grid ends near lon 16 — if this point is outside it (all-null
      // winds) silently fall through to whichever model has data.
      if (hasWindData(arome)) { arome.__model = model; return arome; }
      if (hasWindData(best))  { best.__model = "best_match"; return best; }
    } catch(_) { /* fall back to best_match below */ }
  }
  const fc = await fetchModel("");
  fc.__model = "best_match";
  return fc;
}

async function tryFetchHistorical(lat, lon) {
  // Use local date to avoid UTC-vs-local day mismatch
  const now = new Date();
  const localDateStr = d => {
    const y=d.getFullYear(), mo=String(d.getMonth()+1).padStart(2,'0'), dy=String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  };
  const end = new Date(now); end.setDate(now.getDate()-1);
  const start = new Date(now); start.setDate(now.getDate()-8);
  const fmt = localDateStr;
  const params = new URLSearchParams({
    latitude:lat, longitude:lon,
    start_date:fmt(start), end_date:fmt(end),
    hourly:"windspeed_10m,temperature_2m",
    wind_speed_unit:"ms", timezone:"auto",
  });
  return fetchWithTimeout(`https://archive-api.open-meteo.com/v1/archive?${params}`, 8000);
}

// ── Thermik ───────────────────────────────────────────────────────────────────
// Smallest angle between two compass bearings (0–180°).
function angDiff(a, b){ let d=Math.abs(a-b)%360; return d>180?360-d:d; }

function computeThermik(h, idx, regime) {
  const cape=(h.cape?.[idx]??0), li=(h.lifted_index?.[idx]??0), temp=(h.temperature_2m?.[idx]??20);
  const cloud=(h.cloudcover?.[idx]??50), humid=(h.relativehumidity_2m?.[idx]??60);
  const hour = h.time?.[idx] ? parseInt(h.time[idx].slice(11,13),10) : 12;
  const solar = Math.max(0, Math.sin(Math.PI*(hour-6)/12));
  const capePts = Math.min(40,(cape/3000)*40);
  const liPts = li<0 ? Math.min(30,Math.abs(li)*5) : li>2 ? -10 : 0;
  const tempPts = Math.max(0,(temp-20)*1.5);
  const cloudF = 1-(cloud/100)*0.6;
  const humidF = Math.max(0.4,1-((humid-40)/120));
  // Thermal lake/valley breeze (Ora etc.): a sun-driven wind that does NOT
  // register in CAPE/lifted-index. When the afternoon wind aligns with the
  // spot's thermal regime, credit it so a pumping Ora day no longer reads
  // "Kaum Thermik".
  let breezePts = 0;
  if(regime && hour>=11 && hour<=18){
    const dir=h.winddirection_10m?.[idx];
    if(dir!=null) breezePts = Math.max(0,1-angDiff(dir,regime.dir)/60)*solar*25;
  }
  return Math.round(Math.max(0,Math.min(100,(capePts+liPts+tempPts)*solar*cloudF*humidF+breezePts)));
}

function classifyThermik(max) {
  if(max<10) return{icon:"😴",label:"Kaum Thermik",desc:"Stabile Luftmasse. Wind weitgehend laminar – gute Gleitbedingungen.",color:C.go};
  if(max<30) return{icon:"🌤",label:"Leichte Thermik",desc:"Gelegentliche Aufwinde, mäßige Turbulenzen möglich, vor allem mittags.",color:C.caution};
  if(max<60) return{icon:"⛅",label:"Moderate Thermik",desc:"Aktive Konvektion. Thermische Windverstärkung am Nachmittag erwartet. Böen!",color:C.caution};
  return{icon:"⛈",label:"Starke Thermik",desc:"Intensive Instabilität. Sturmböen und Gewitter möglich!",color:C.stop};
}

function seaBreeze(windDir, hour, month, regime) {
  if(hour<10||hour>19) return{active:false,boost:0,align:0};
  // Align against the spot's thermal-breeze direction (Garda Ora ~195°, coastal
  // sea breeze 250°), wrap-around safe so e.g. 198° still matches a 195° target.
  const target = regime?.dir ?? 250;
  const align=Math.max(0,1-angDiff(windDir,target)/60);
  const season=[0,.4,.5,.7,.9,1,1,1,.8,.6,.4,.2,.3][month]??0.5;
  const hf=Math.sin(Math.PI*(hour-10)/9);
  const boost=align*season*hf*3.5;
  return{active:align>0.3,boost:Math.round(boost*10)/10,align};
}

// ── FoilScore ─────────────────────────────────────────────────────────────────
function calcWindow(weight,wingM2,foilCm2,skill,knownPlaneMs) {
  const sMin = {beginner:1.50,intermediate:1.25,advanced:1.00,pro:0.85}[skill]??1.15;
  const sOpt = {beginner:1.60,intermediate:2.00,advanced:2.60,pro:3.20}[skill]??2.00;
  const sMax = {beginner:2.00,intermediate:2.60,advanced:3.50,pro:4.50}[skill]??2.60;
  let minW;
  if(knownPlaneMs && knownPlaneMs>0){
    minW = knownPlaneMs;
  } else {
    const load=weight/wingM2, foilF=1800/foilCm2;
    minW=Math.max(2.5,(3.5+load*0.15+foilF*0.8)*sMin*0.85);
  }
  return{ minWind:Math.round(minW*10)/10,
          optMin: Math.round(minW*1.2*10)/10,
          optMax: Math.round(minW*sOpt*10)/10,
          maxWind:Math.round(minW*sMax*10)/10 };
}
function scoreHour(w,win) {
  if(w<win.minWind) return Math.max(0,Math.round((w/win.minWind)*45));
  if(w<win.optMin) return Math.round(55+((w-win.minWind)/(win.optMin-win.minWind))*30); // "fahrbar aber zäh" 55→85
  if(w<=win.optMax) return 100;
  if(w<=win.maxWind) return Math.round(100-((w-win.optMax)/(win.maxWind-win.optMax))*50);
  return Math.max(0,Math.round(50-(w-win.maxWind)*10));
}
function scoreDay(winds,win,start=0) {
  // Tages-Score = bestes zusammenhängendes 4h-Fenster zwischen 9 und 19 Uhr.
  // Schwache Vormittage drücken den Score nicht mehr; es zählt die beste Session.
  return bestSession(winds,win,start).score;
}
// Findet das beste 4h-Fenster (Score + Start/Endstunde) für den Tag
function bestSession(winds,win,start=0) {
  let best={score:0,startHour:null,endHour:null};
  for(let s=9;s<=15;s++){
    const hrs=[];
    for(let h=s;h<s+4;h++){ const v=winds[start+h]; if(v!==undefined) hrs.push(scoreHour(v,win)); }
    if(!hrs.length) continue;
    const avg=Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length);
    if(avg>best.score) best={score:avg,startHour:s,endHour:s+4};
  }
  return best;
}

// ── Equipment selection v2.2.0 ────────────────────────────────────────────────
// Given the rider's gear list and the day's representative wind (m/s),
// pick the BEST setup: the one whose window scores highest for that wind.
// Tie-break: prefer the setup whose optimal range is most centered on the wind.
function pickBestSetup(gearList, weight, skill, windMs) {
  if(!gearList || !gearList.length) return null;
  let best = null;
  for(const g of gearList){
    const plane = g.planeKn ? (parseFloat(g.planeKn)/1.94384) : null;
    const win = calcWindow(weight, parseFloat(g.wing), parseFloat(g.foil), skill, plane);
    const sc = scoreHour(windMs, win);
    // centeredness: how close wind is to the middle of the optimal band
    const mid = (win.optMin + win.optMax) / 2;
    const center = 1 - Math.min(1, Math.abs(windMs - mid) / (win.optMax - win.optMin + 0.01));
    const rank = sc * 100 + center * 10;
    if(!best || rank > best.rank){
      best = { gear:g, win, score:sc, rank };
    }
  }
  return best;
}

// localStorage helpers (safe — no crash if storage unavailable, e.g. in preview)
function loadStored(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function saveStored(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e) { return false; }
}
// Persist a setting to localStorage AND the per-user server store. iOS Safari
// drops localStorage (Private Browsing / "Block All Cookies" / ITP), so the
// server copy is the durable one; the local write is just an offline cache.
// Fire-and-forget — the UI already updated from React state.
function savePref(key, val) {
  saveStored(key, val);
  fetch(`/api/prefs/${key}`, {
    method: "PUT", credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ value: val }),
  }).catch(()=>{});
}

// ── Real station vs model: confidence scoring v2.2.0 ─────────────────────────
const PROXY_BASE = "/api/station";

async function fetchStationCurrent(lat, lon) {
  try {
    const r = await fetch(`${PROXY_BASE}/current?lat=${lat}&lon=${lon}`, { signal: AbortSignal.timeout(7000) });
    if(!r.ok) throw new Error(`Proxy ${r.status}`);
    return r.json();
  } catch(e) { return { ok:false, error:e.message }; }
}
async function fetchStationHistory(lat, lon, days=7) {
  try {
    const r = await fetch(`${PROXY_BASE}/history?lat=${lat}&lon=${lon}&days=${days}`, { signal: AbortSignal.timeout(12000) });
    if(!r.ok) throw new Error(`Proxy ${r.status}`);
    return r.json();
  } catch(e) { return { ok:false, error:e.message }; }
}
// Station-vs-model wind bias over an overlapping window (Meteostat history vs
// Open-Meteo archive, both m/s). Replaces the Weatherbit history that the plan
// never returned. First (uncached) call downloads a bulk file → generous timeout.
async function fetchStationBias(lat, lon) {
  try {
    const r = await fetch(`${PROXY_BASE}/bias?lat=${lat}&lon=${lon}`, { signal: AbortSignal.timeout(20000) });
    if(!r.ok) throw new Error(`Proxy ${r.status}`);
    return r.json();
  } catch(e) { return { ok:false, error:e.message }; }
}

function computeConfidence({ stationCurrent, modelCurrentWind, modelCurrentDir, stationHistMeanWind, modelHistMeanWind }) {
  const parts=[], notes=[];
  if(stationCurrent && stationCurrent.ok && modelCurrentWind!=null && stationCurrent.wind!=null){
    const errMs=Math.abs(stationCurrent.wind-modelCurrentWind);
    parts.push({w:0.45,v:Math.max(0,100-(errMs/6)*100)});
    notes.push(`Wind-Δ aktuell ${errMs.toFixed(1)} m/s`);
  }
  if(stationCurrent && stationCurrent.ok && modelCurrentDir!=null && stationCurrent.dir!=null){
    let dd=Math.abs(stationCurrent.dir-modelCurrentDir)%360; if(dd>180) dd=360-dd;
    parts.push({w:0.20,v:Math.max(0,100-(dd/90)*100)});
    notes.push(`Richtungs-Δ ${Math.round(dd)}°`);
  }
  if(stationHistMeanWind!=null && modelHistMeanWind!=null){
    const bias=Math.abs(stationHistMeanWind-modelHistMeanWind);
    parts.push({w:0.35,v:Math.max(0,100-(bias/4)*100)});
    notes.push(`Hist. Bias ${bias.toFixed(1)} m/s`);
  }
  if(!parts.length) return { confidence:null, notes:["Kein Stationsabgleich verfügbar"] };
  const wsum=parts.reduce((a,p)=>a+p.w,0);
  return { confidence: Math.round(parts.reduce((a,p)=>a+p.v*p.w,0)/wsum), notes };
}

function applyConfidence(rawScore, confidence) {
  if(confidence==null) return { score:rawScore, adjusted:false, confidence:null };
  const pull=(1-confidence/100)*0.4;
  return { score:Math.round(rawScore*(1-pull)+50*pull), adjusted:confidence<80, confidence };
}

function classifyConfidence(c) {
  if(c==null) return { label:"Kein Abgleich", color:C.muted, icon:"○" };
  if(c>=80)   return { label:"Hohe Sicherheit", color:C.go, icon:"●" };
  if(c>=55)   return { label:"Mittlere Sicherheit", color:C.caution, icon:"◐" };
  return { label:"Geringe Sicherheit", color:C.stop, icon:"◔" };
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
const TT = {
  contentStyle:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,fontSize:11,fontFamily:"monospace",color:C.text},
  labelStyle:{color:C.muted}, itemStyle:{color:C.text},
};
const ax = { tick:{fill:C.muted,fontSize:10,fontFamily:"monospace"}, axisLine:{stroke:C.border}, tickLine:false };
const gr = { stroke:C.gridStroke };

// Arrow glyph for the wind-direction chart: a small shaft+head pointing in the
// direction the wind BLOWS TO. Meteo `dir` = where it comes FROM, so +180; SVG
// 0° points right, so −90 to make 0° point up (North).
const DirArrow = (props) => {
  const { cx, cy, payload } = props;
  if(cx==null || cy==null || payload?.dir==null) return null;
  const rot = payload.dir + 180 - 90;
  return (
    <g transform={`translate(${cx},${cy}) rotate(${rot})`}>
      <path d="M-7,0 L5,0 M5,0 L0,-4 M5,0 L0,4" stroke={C.caution} strokeWidth={1.5} fill="none" strokeLinecap="round" strokeLinejoin="round" />
    </g>
  );
};

// Calls Better Auth REST endpoints directly — no client bundle needed in page.
// Auth palette derived from the main app theme (C) so login/registration
// matches the dashboard look instead of the old standalone teal scheme.
const CA={deep:C.panel,panel:C.surface,p2:C.bg,foam:C.text,

// Switch palette in place. Rewrites C plus every style object derived from it
// (chart tooltip/axes/grid + auth palette), so a re-render re-themes everything.
function applyTheme(name){
  Object.assign(C, THEMES[name] || THEMES.dark);
  Object.assign(TT.contentStyle, { background:C.panel, border:`1px solid ${C.border}`, color:C.text });
  Object.assign(TT.labelStyle, { color:C.muted });
  Object.assign(TT.itemStyle, { color:C.text });
  Object.assign(ax.tick, { fill:C.muted });
  Object.assign(ax.axisLine, { stroke:C.border });
  gr.stroke = C.gridStroke;
  Object.assign(CA, { deep:C.panel, panel:C.surface, p2:C.bg, foam:C.text,
    haze:C.muted, lift:C.signal, coral:C.stop, line:C.border2 });
}

function AuthGate({children}){
  const [sess,setSess]=useState(null); // null=loading, false=anon, obj=authed
  const [mode,setMode]=useState('signin');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{
    fetch('/api/auth/get-session',{credentials:'include'})
      .then(r=>r.json()).then(d=>setSess(d&&d.user?d:false)).catch(()=>setSess(false));
  },[]);

  async function submit(){
    setErr('');setBusy(true);
    try{
      const url=mode==='signup'?'/api/auth/sign-up/email':'/api/auth/sign-in/email';
      const body=mode==='signup'?{name,email,password:pw}:{email,password:pw};
      const r=await fetch(url,{method:'POST',credentials:'include',
        headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(!r.ok)setErr(d.message||d.error||'Anmeldung fehlgeschlagen.');
      else setSess(d);
    }catch{setErr('Server nicht erreichbar.');}
    finally{setBusy(false);}
  }

  async function doSignOut(){
    await fetch('/api/auth/sign-out',{method:'POST',credentials:'include'});
    setSess(false);setEmail('');setPw('');setErr('');
  }

  const INP={width:'100%',boxSizing:'border-box',background:CA.p2,color:CA.foam,
    border:`1px solid ${CA.line}`,borderRadius:10,padding:'11px 12px',fontSize:16};

  if(sess===null)return(
    <div style={{minHeight:'100vh',display:'grid',placeItems:'center',background:CA.deep}}>
      <p style={{color:CA.haze,fontFamily:'monospace'}}>Session wird geprüft…</p>
    </div>
  );

  if(!sess)return(
    <div style={{minHeight:'100vh',display:'grid',placeItems:'center',
        background:`radial-gradient(120% 90% at 50% -10%,${C.surface},${C.bg})`,padding:20}}>
      <div style={{width:'100%',maxWidth:380,background:CA.deep,
          border:`1px solid ${CA.line}`,borderRadius:18,padding:26,
          boxShadow:'0 30px 70px -30px rgba(0,0,0,.75)'}}>
        <div style={{fontSize:11,letterSpacing:'.2em',textTransform:'uppercase',
          color:CA.lift,fontWeight:700,marginBottom:6}}>WindFoil</div>
        <h1 style={{fontSize:21,fontWeight:700,color:CA.foam,margin:'0 0 4px'}}>
          {mode==='signup'?'Account erstellen':'Willkommen zurück'}</h1>
        <p style={{fontSize:13,color:CA.haze,margin:'0 0 20px'}}>
          {mode==='signup'?'Sessions tracken & Score schärfen.':'Anmelden und lossurfen.'}</p>
        <div style={{display:'flex',gap:6,background:CA.p2,padding:4,borderRadius:11,marginBottom:18}}>
          {['signin','signup'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr('');}}
              style={{flex:1,padding:9,border:'none',borderRadius:8,cursor:'pointer',
                background:mode===m?CA.panel:'transparent',
                color:mode===m?CA.foam:CA.haze,fontWeight:600,fontSize:13}}>
              {m==='signin'?'Anmelden':'Registrieren'}
            </button>
          ))}
        </div>
        {err&&<p style={{color:CA.coral,fontSize:13,margin:'0 0 12px'}}>{err}</p>}
        {mode==='signup'&&(
          <div style={{marginBottom:12}}>
            <label style={{display:'block',fontSize:12,color:CA.haze,marginBottom:6}}>Name</label>
            <input style={INP} value={name} onChange={e=>setName(e.target.value)}
              autoComplete="name" placeholder="Dein Name"/>
          </div>
        )}
        <div style={{marginBottom:12}}>
          <label style={{display:'block',fontSize:12,color:CA.haze,marginBottom:6}}>E-Mail</label>
          <input style={INP} type="email" value={email} onChange={e=>setEmail(e.target.value)}
            autoComplete="email" placeholder="mail@example.com"/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{display:'block',fontSize:12,color:CA.haze,marginBottom:6}}>
            Passwort (min. 10 Zeichen)</label>
          <input style={INP} type="password" value={pw} onChange={e=>setPw(e.target.value)}
            autoComplete={mode==='signup'?'new-password':'current-password'}
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <button onClick={submit} disabled={busy}
          style={{width:'100%',padding:13,border:'none',borderRadius:11,cursor:'pointer',
            background:CA.lift,color:'#fff',fontWeight:700,fontSize:14,opacity:busy?0.5:1}}>
          {busy?'Einen Moment…':mode==='signup'?'Account erstellen':'Anmelden'}
        </button>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'8px 16px',background:CA.deep,borderBottom:`1px solid ${CA.line}`}}>
        <span style={{fontSize:13,color:CA.haze}}>
          Eingeloggt als <b style={{color:CA.foam}}>{sess.user?.email}</b>
        </span>
        <button onClick={doSignOut}
          style={{padding:'6px 12px',borderRadius:8,cursor:'pointer',
            border:`1px solid ${CA.line}`,background:'transparent',
            color:CA.foam,fontSize:13,fontWeight:600}}>
          Abmelden
        </button>
      </div>
      {children}
    </div>
  );
}

  const [windKt,setWindKt] = useState(12);
  const [rating,setRating] = useState(0);

  const [notes,setNotes]   = useState("");

  const [err,setErr]       = useState("");

  const tz = (()=>{ try{ return Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"; }catch{ return "UTC"; } })();
  const step = d => setWindKt(w => Math.min(35, Math.max(5, Math.round((w+d)*2)/2)));

  async function submit() {
    if(planed===null){ setErr("Bitte zuerst angeben, ob du aufs Foil gekommen bist."); return; }
    setBusy(true); setErr("");

      const sr = await fetch("/api/feedback/spot",{method:"POST",credentials:"include",

      const { spot } = await sr.json();

        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({spotId:spot.id,planed,planingWindKt:planed?windKt:null,

          forecast:forecast||undefined})});

      if(!r.ok){
        setErr(d.error==="feedback_locked"
          ? "Feedback ist nur am Tag der Session möglich."
          : (d.error || "Speichern fehlgeschlagen."));
      } else { const cal=d.calibration||{}; setDone(cal); if(onCalibrated) onCalibrated(cal); }

          )}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {

  const [showLoc,setShowLoc]   = useState(false);

  useEffect(()=>{

      fetch(`/api/feedback/spot-calibration?lat=${loc.lat}&lon=${loc.lon}`,{credentials:"include"})

        .catch(()=>{ if(!cancelled) setSpotCal(null); });

  },[loc&&loc.lat,loc&&loc.lon]);

  // Hydrate the active spot + recent list from the SERVER on mount. This is what
  // makes manually added spots survive on iOS Safari, where localStorage is
  // dropped (Private Browsing / "Block All Cookies" / ITP). localStorage is now
  // only an offline cache; the server copy wins when it's available.
  useEffect(()=>{
    let cancelled=false;
    fetch("/api/locations",{credentials:"include"})
      .then(r=>r.ok?r.json():null)
      .then(d=>{

        if(d.active&&d.active.lat!=null&&d.active.lon!=null){ setLoc(d.active); saveStored("wf_loc",d.active); }
